document: rfc-2320
kind: wire-format
summary: 'IpoaAtmConnKind is an INTEGER distinguishing VC call-control types: pvc(1), svcIncoming(2), svcOutgoing(3), spvcInitiator(4), spvcTarget(5). An spvcInitiator is always cross-connected to an svcOutgoing, and an spvcTarget to an svcIncoming.'
