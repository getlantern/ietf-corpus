document: rfc-6698
kind: normative-requirement
summary: If a certificate association contains a certificate usage, selector, or matching type not understood by the TLS client, or if the comparison data is malformed, or if a cryptographic algorithm is considered too weak by local policy, that certificate association MUST be considered unusable.
section: "4.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
