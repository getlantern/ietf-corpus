document: rfc-3347
kind: security-consideration
summary: Transporting block storage (SCSI) over IP opens a whole new opportunity for malicious attacks. Attacks can take the active form (identity spoofing, man-in-the-middle) or the passive form (eavesdropping), unlike directly-attached storage where physical connections offered little attack surface.
section: "7"
topics:
