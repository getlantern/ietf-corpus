document: rfc-2078
kind: protocol-element
summary: GSS_Accept_sec_context() accepts an inbound security context from a peer, consuming the input_token produced by GSS_Init_sec_context(). Returns src_name (the authenticated initiator identity), delegated_cred_handle if delegation was granted, and an optional output_token for mutual authentication. Returns GSS_S_CONTINUE_NEEDED if further exchanges are required.
section: 2.2.2
topics:
    - security
    - crypto
