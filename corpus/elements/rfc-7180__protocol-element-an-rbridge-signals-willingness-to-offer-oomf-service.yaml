document: rfc-7180
kind: protocol-element
summary: An RBridge signals willingness to offer OOMF service by setting a bit (Bit 1 of the RESV field) associated with a neighbor's SNPA in the TRILL Neighbor TLV within its TRILL Hellos. An overloaded RBridge RB2 MUST advertise in its LSP the distribution trees used by any neighbor providing it OOMF service, so that RPFC works campus-wide.
section: 2.4.2.2
topics:
    - routing
