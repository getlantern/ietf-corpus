document: rfc-3062
kind: normative-requirement
summary: If oldPasswd is present and cannot be verified or is incorrect, the server SHALL NOT change the user password. If oldPasswd is absent, the server MAY use other policy to determine whether to change the password.
section: "3"
rfc2119_level: SHALL NOT
