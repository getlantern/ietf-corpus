summary: The 'dtls' list (keyed by name) contains a 'certs' sub-list with mandatory fields value (PEM-format string, nacm:default-deny-write), type (identityref from dtls-cert-types), private-key (binary, nacm:default-deny-all), and algorithm (identityref). The 'default-apply' boolean is mandatory.
