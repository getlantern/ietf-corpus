document: rfc-7952
kind: interoperability-note
summary: 'Annotations sent by a server should not break clients that do not support them. Safe use cases include: annotations that are integral to a negotiated capability, auxiliary non-critical annotations, or annotations explicitly requested by the client via a protocol operation parameter.'
section: "4"
topics:
