document: rfc-5034
kind: normative-requirement
summary: A server implementation MUST implement a configuration in which it does NOT advertise or permit any plaintext password mechanisms unless the STLS command has been used to negotiate a TLS session. Per RFC 4616, this SHOULD be the default configuration.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - security
    - tls
