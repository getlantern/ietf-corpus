document: rfc-7711
kind: normative-requirement
summary: The location provided in any redirect response to a POSH HTTPS request MUST specify an HTTPS URI. Source domains SHOULD use only temporary redirect mechanisms (HTTP 302 or 307).
section: "10"
rfc2119_level: MUST
