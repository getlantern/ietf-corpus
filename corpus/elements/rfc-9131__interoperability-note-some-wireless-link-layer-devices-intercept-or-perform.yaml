document: rfc-9131
kind: interoperability-note
summary: Some wireless link-layer devices intercept or perform ND proxy actions on ND packets, which may prevent gratuitous NAs from reaching routers. Alternative approaches relying on NS or RS messages have the same limitation.
section: "8.3"
