document: rfc-9244
kind: registry
summary: IANA maintains the 'DOTS Signal Channel CBOR Key Values' registry. RFC 9244 adds new entries for telemetry attributes (e.g., tsid, tmid, telemetry-setup, total-pipe-capacity, baseline, attack-detail, vendor-id, attack-id, top-talker, etc.) to this registry.
