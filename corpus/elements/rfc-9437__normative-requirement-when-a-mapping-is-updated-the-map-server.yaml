document: rfc-9437
kind: normative-requirement
summary: When a mapping is updated the Map-Server MUST notify all subscribers via Map-Notify messages carrying the most up-to-date mapping information. The Map-Server increments the nonce by one for every Map-Notify sent as a publication to a given xTR-ID for a particular EID-Prefix.
section: "6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
