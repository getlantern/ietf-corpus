document: rfc-7705
kind: security-consideration
summary: The AS migration mechanisms manipulate the AS_PATH attribute to prevent artificial lengthening; however, this manipulation could result in unexpected shifts in traffic patterns and potential congestion if misused. Since these mechanisms are only configurable through router management interfaces, standard security measures should restrict access to those interfaces.
section: "6"
topics:
    - bgp
    - routing
    - security
