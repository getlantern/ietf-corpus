document: rfc-7917
kind: interoperability-note
summary: If a receiving node does not understand a tag value, it MUST ignore the specific tag and flood the Router CAPABILITY TLV without any change, as defined in RFC 4971. This preserves backward compatibility.
section: "4.1"
topics:
    - routing
