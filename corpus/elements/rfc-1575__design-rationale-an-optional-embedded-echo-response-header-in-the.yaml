document: rfc-1575
kind: design-rationale
summary: An optional embedded echo-response header in the echo-request data field (signaled by first octet 0x81) allows a router to formulate a standard echo-response; however, this is noted as potentially unnecessary overhead in a common-format environment like the Internet and is not required between any two systems.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
