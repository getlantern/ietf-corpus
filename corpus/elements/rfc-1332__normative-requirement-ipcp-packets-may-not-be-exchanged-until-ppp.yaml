document: rfc-1332
kind: normative-requirement
summary: IPCP packets may not be exchanged until PPP has reached the Network-Layer Protocol phase. IPCP packets received before this phase is reached should be silently discarded.
section: "2"
rfc2119_level: SHOULD NOT
