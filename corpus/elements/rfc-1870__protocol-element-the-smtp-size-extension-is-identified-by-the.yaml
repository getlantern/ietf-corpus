document: rfc-1870
kind: protocol-element
summary: The SMTP SIZE extension is identified by the EHLO keyword 'SIZE'. An optional decimal parameter indicates the server's fixed maximum message size in bytes; a value of 0 means no fixed maximum; omission means no information is conveyed.
