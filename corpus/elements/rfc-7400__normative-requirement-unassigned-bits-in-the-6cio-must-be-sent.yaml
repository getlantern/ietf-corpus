document: rfc-7400
kind: normative-requirement
summary: Unassigned bits in the 6CIO MUST be sent as zero and MUST be ignored on reception until assigned by IANA. Length values larger than 1 MUST be accepted by implementations to enable future extensions.
section: "3.4"
rfc2119_level: MUST
