document: rfc-8414
kind: normative-requirement
summary: The 'issuer' value returned in the metadata response MUST be identical to the authorization server's issuer identifier value used as the prefix for the metadata request URL. If these values are not identical, the data contained in the response MUST NOT be used.
section: "3.3"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
