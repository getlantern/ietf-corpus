document: rfc-8659
kind: protocol-element
summary: The CAA 'iodef' Property specifies a URL for reporting certificate mis-issuance. Supported URL schemes are 'mailto:' (IODEF report as MIME email attachment), 'http:', and 'https:' (submitted as a web service request per RFC 6546). The iodef Property does not restrict certificate issuance.
section: "4.4"
topics:
    - dns
    - security
