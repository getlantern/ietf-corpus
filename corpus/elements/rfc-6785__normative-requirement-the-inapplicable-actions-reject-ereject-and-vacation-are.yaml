document: rfc-6785
kind: normative-requirement
summary: The inapplicable actions 'reject', 'ereject', and 'vacation' are not applicable to IMAP events. Their appearance in the 'require' control or their use in an IMAP event MUST result in an error condition that terminates the Sieve script.
section: "3.11"
rfc2119_level: MUST
topics:
    - email
