document: rfc-9254
kind: security-consideration
summary: When SIDs are in use, interpretation of encoded data depends not only on having the correct YANG modules but also on the correct SID mapping information. Management and evolution of SID mappings therefore requires the same care as managing the YANG modules themselves.
