document: rfc-959
kind: normative-requirement
summary: Image type padding (required at end-of-file or end-of-record due to storage system alignment) MUST be all zero bits, may occur only at the end of the file or record, and there MUST be a way to identify padding bits so they can be stripped upon retrieval. The padding scheme must be well publicized.
section: 3.1.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
