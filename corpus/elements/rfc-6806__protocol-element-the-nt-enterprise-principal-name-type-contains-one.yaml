document: rfc-6806
kind: protocol-element
summary: The NT-ENTERPRISE principal name type contains one component (a realm-defined string) intended as an alias for another principal in the enterprise. It is transmitted as a single component in the client name field of AS-REQ with name type NT-ENTERPRISE, enabling users to log on as 'alice@EXAMPLE.COM' regardless of which sub-realm contains their account.
section: "5"
topics:
    - security
extracted_by: claude-sonnet-4-6
