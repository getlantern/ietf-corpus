document: rfc-2474
kind: normative-requirement
summary: The mapping of codepoints to PHBs MUST be configurable via a logical equivalent of a configurable mapping table. PHB specifications MUST include a recommended default codepoint, which MUST be unique within the standard codepoint space.
section: "3"
rfc2119_level: MUST
