document: rfc-2578
kind: wire-format
summary: Gauge32 and Unsigned32 both encode as [APPLICATION 2] IMPLICIT INTEGER (0..4294967295), making them wire-indistinguishable. TimeTicks uses [APPLICATION 3] IMPLICIT INTEGER (0..4294967295) representing hundredths of seconds between two epochs.
