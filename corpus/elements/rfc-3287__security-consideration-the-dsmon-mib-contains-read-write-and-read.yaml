document: rfc-3287
kind: security-consideration
summary: The DSMON MIB contains read-write and read-create objects that could be used to configure monitoring and aggregation profiles. Unauthorized access to these objects could disrupt data collection or falsify traffic statistics, so SNMP access control (e.g., SNMPv3 VACM) should be applied.
section: "9"
topics:
