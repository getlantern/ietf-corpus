document: rfc-4694
kind: normative-requirement
summary: During ISUP-to-VoIP protocol conversion, a GSTN gateway MUST include "npdi" when the PNTI bit in the FCI is set to "1", MUST include "cic" when the ISUP CIP is present, and MUST convert the ISUP routing number to the "rn" parameter for ported numbers.
section: 5.2.4
rfc2119_level: MUST
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
