document: rfc-6469
kind: security-consideration
summary: Confidentiality of DV RTP streams is achieved by encryption, which can be applied after compression without conflict since compression is end-to-end. DV encoding does not exhibit significant non-uniform computational load, so pathological datagram injection for denial-of-service is not a significant concern.
section: "4"
topics:
