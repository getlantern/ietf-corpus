document: rfc-7741
kind: protocol-element
summary: SLI (Slice Loss Indication) for VP8 uses the six least significant bits of the current frame's PictureID in the PictureID field of the SLI message. If the current frame has no PictureID, the receiver MAY send the last received PictureID+1.
section: "5.2"
topics:
    - rtp
    - realtime
