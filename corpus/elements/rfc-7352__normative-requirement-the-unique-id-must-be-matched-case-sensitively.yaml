document: rfc-7352
kind: normative-requirement
summary: The unique ID MUST be matched case-sensitively against the duplicate-tracking list, regardless of how the unique ID was determined. Case-insensitive behavior when using ':uniqueid' must be achieved by normalizing the value in the Sieve script using the 'variables' extension.
section: "3.1"
rfc2119_level: MUST
