document: rfc-8577
kind: protocol-element
summary: A delegation hop is a transit hop of a Segment Routed RSVP-TE LSP selected to assist in imposition of the label stack when the ingress LER cannot impose the full stack. A delegation label is assigned at the delegation hop to represent a set of labels that will be pushed there.
