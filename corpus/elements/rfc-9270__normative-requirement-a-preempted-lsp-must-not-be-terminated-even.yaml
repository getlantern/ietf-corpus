document: rfc-9270
kind: normative-requirement
summary: A preempted LSP MUST NOT be terminated even after its resources have been deallocated. End nodes MUST keep refreshing both working and protecting LSPs regardless of failure or preemption status.
section: "5.4"
rfc2119_level: MUST NOT
topics:
