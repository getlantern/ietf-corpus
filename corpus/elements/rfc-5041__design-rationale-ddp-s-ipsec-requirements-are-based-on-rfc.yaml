document: rfc-5041
kind: design-rationale
summary: DDP's IPsec requirements are based on RFC 2401 (older IPsec) profiled by RFC 3723, rather than the newer RFC 4301, because an important early application is iSER (iSCSI over RDMA), and using a common IPsec profile across iSCSI and RDDP simplifies deployment.
