document: rfc-6511
kind: normative-requirement
summary: An ingress LSR requesting non-PHP behavior SHOULD examine the Non-PHP behavior flag in the RRO Attributes subobject and MAY send a Path Tear to an egress that has not set the flag or that assigns a NULL label value.
