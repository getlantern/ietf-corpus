document: rfc-2720
kind: design-rationale
summary: The flowDataPackageTable was added (replacing the deprecated flowColumnActivityTable) to allow a meter reader to retrieve all required attribute values in a single MIB object. Combined with SNMPv2 GetBulk, this dramatically reduces the number of protocol exchanges needed to upload flow data.
