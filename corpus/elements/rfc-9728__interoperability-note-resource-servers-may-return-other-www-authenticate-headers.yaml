document: rfc-9728
kind: interoperability-note
summary: Resource servers MAY return other WWW-Authenticate headers indicating various authentication schemes alongside the resource_metadata parameter, allowing support for clients that may or may not implement this specification and allowing clients to choose their preferred authentication scheme.
