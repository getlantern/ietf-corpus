document: rfc-7024
kind: normative-requirement
summary: In Case 2 (received I-PMSI/S-PMSI A-D route does not carry the receiving V-hub's RT-VH), when the V-hub accepts an S-PMSI or SA A-D route, it MUST reoriginate the route targeted to its V-spokes by replacing the RT(s) with RT-VH, updating the RD, Next Hop, and (for S-PMSI) the Originating Router's IP address and PMSI Tunnel attribute.
section: 7.8.2
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - vpn
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
