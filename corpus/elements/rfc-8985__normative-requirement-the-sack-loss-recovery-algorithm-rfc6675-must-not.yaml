document: rfc-8985
kind: normative-requirement
summary: The SACK loss recovery algorithm [RFC6675] MUST NOT be used together with RACK-TLP because RFC 6675's NextSeg() does not handle lost retransmissions and does not specify the required additional congestion response for that case.
section: "9.2"
rfc2119_level: MUST NOT
topics:
    - tcp
    - congestion
