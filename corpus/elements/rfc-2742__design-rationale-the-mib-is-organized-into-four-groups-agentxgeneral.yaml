document: rfc-2742
kind: design-rationale
summary: 'The MIB is organized into four groups—agentxGeneral, agentxConnection, agentxSession, agentxRegistration—reflecting the natural layering of AgentX: a session is carried over a connection, and registrations belong to sessions. Shared indices (agentxConnIndex, agentxSessionIndex) express the many-to-one relationships between these tables.'
