summary: dot3StatsTable (dot3 2) is the Ethernet-like Statistics group, a mandatory table of per-interface error and collision counters. It includes 16 Counter objects covering alignment errors, FCS errors, collision types, carrier sense errors, frame size errors, and internal MAC errors.
