document: rfc-7309
kind: normative-requirement
summary: In the 3:1 Option B (master/slave) model, when the master PE detects an active PW DOWN it SHOULD enable another local standby PW. Only when both inter-domain PWs on the master PE are DOWN SHOULD the ICCP peer PE in the same RG switchover.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
