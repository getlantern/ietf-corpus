document: rfc-1521
kind: normative-requirement
summary: All multipart subtypes MUST use the identical multipart syntax. Any unrecognized multipart subtype must be treated as multipart/mixed, ensuring that all conformant user agents can at least recognize and separate the parts of any multipart entity.
section: "7.2"
rfc2119_level: MUST
topics:
