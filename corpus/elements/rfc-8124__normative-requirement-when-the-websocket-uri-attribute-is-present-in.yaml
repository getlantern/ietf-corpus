document: rfc-8124
kind: normative-requirement
summary: When the 'websocket-uri' attribute is present in an SDP media section, the IP address in the 'c=' line SHALL be ignored and the full URI SHALL be used to open the WebSocket connection. Clients MUST use the URI and ignore both the 'c=' IP address and the 'm=' port.
section: "3.2"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
