document: rfc-9769
kind: normative-requirement
summary: If a request does not conform to interleaved mode, the server MUST NOT respond in interleaved mode; if it responds, it MUST use the basic mode. In all cases, the server SHOULD save new receive and transmit timestamps for future interleaved responses.
section: "2"
rfc2119_level: MUST
topics:
    - ntp
