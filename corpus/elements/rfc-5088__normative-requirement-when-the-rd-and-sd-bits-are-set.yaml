document: rfc-5088
kind: normative-requirement
summary: When the Rd and Sd bits are set in the PATH-SCOPE sub-TLV, the PCED TLV MUST NOT contain a NEIG-PCE-DOMAIN sub-TLV. When the R bit is clear, the Rd bit MUST be ignored on receipt; when S bit is clear, the Sd bit MUST be ignored on receipt.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
