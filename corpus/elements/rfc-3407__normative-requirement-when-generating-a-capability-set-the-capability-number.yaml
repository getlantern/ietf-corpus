document: rfc-3407
kind: normative-requirement
summary: When generating a capability set, the capability number MUST start with 1 in the first capability description, and be incremented by the number of media formats in the fmt list for each subsequent capability description. Receivers MUST NOT reject capability descriptions due to gaps in capability numbers.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
