document: rfc-3390
kind: interoperability-note
summary: 'Larger TCP initial windows do not dramatically increase network burstiness because TCP traffic is already bursty: delayed ACKs during congestion avoidance cause two-segment bursts, and during slow start cause three-segment bursts; four- and five-segment bursts from dropped ACKs are not rare.'
section: "7"
topics:
