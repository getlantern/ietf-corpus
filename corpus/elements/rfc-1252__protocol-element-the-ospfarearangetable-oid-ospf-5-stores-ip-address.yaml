document: rfc-1252
kind: protocol-element
summary: The ospfAreaRangeTable (OID ospf 5) stores IP address range summaries configured to be propagated from an area to reduce routing information exported beyond its borders, indexed by ospfAreaRangeAreaID and ospfAreaRangeNet. Each entry pairs an IP network address with a subnet mask.
