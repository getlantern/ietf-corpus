document: rfc-8397
kind: protocol-element
summary: Level 2 RBridges use the nickname range 0xF000 through 0xFFBF. The highest-priority border router for a Level 1 area contends in Level 2 for blocks of nicknames in the range 0x0001 to 0xEFFF, with blocks of 64 aligned on multiples of 64 being recommended.
section: "4.2"
topics:
    - routing
