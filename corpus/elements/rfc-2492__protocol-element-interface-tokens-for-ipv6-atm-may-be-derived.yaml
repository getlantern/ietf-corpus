document: rfc-2492
kind: protocol-element
summary: Interface tokens for IPv6/ATM MAY be derived from AESA ESI+SEL values as an 8-octet field [0x00][ESI(6 octets)][SEL(1 octet)], where the leading 0x00 resets the EUI-64 Global/Local bit, indicating a non-globally-unique token.
section: "5.1"
topics:
    - ip
    - v6ops
