document: rfc-9059
kind: protocol-element
summary: 'Two new Association Types are defined: ''Single-Sided Bidirectional LSP Association'' (Type 4) and ''Double-Sided Bidirectional LSP Association'' (Type 5), using the generic ASSOCIATION object (Object-Class value 40) defined in RFC 8697. In single-sided, both forward and reverse LSPs are initiated on one endpoint; in double-sided, forward LSPs are initiated on both endpoints independently.'
section: "4.1"
topics:
    - mpls
    - routing
