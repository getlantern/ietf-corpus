document: rfc-7532
kind: normative-requirement
summary: For each naming context containing federation entries, there MUST be an LDAP entry (the NSDB Container Entry, NCE) that is superior to all federation entries, and the naming context's root entry MUST include fedfsNsdbContainerInfo as one of its object classes. The fedfsNceDN attribute MUST NOT be empty.
section: "4.1"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
