document: rfc-8489
kind: normative-requirement
summary: For subsequent long-term credential requests, the client MUST include USERNAME or USERHASH, REALM, NONCE, PASSWORD-ALGORITHM, and MESSAGE-INTEGRITY-SHA256 (or MESSAGE-INTEGRITY) using cached values. If the response contains a PASSWORD-ALGORITHMS attribute, all subsequent requests MUST use MESSAGE-INTEGRITY-SHA256 only.
section: 9.2.3.2
rfc2119_level: MUST
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
