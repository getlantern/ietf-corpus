document: rfc-9611
kind: protocol-element
summary: TS_MAX_QUEUE is a new IKEv2 Notify Message Error Type (value 48) that a responder sends when it is unwilling to create more additional Child SAs for a particular Traffic Selector combination. It carries no data and is distinct from NO_ADDITIONAL_SAS to avoid signaling that no Child SAs with different TSi/TSr are possible.
section: "1"
topics:
    - ipsec
    - vpn
