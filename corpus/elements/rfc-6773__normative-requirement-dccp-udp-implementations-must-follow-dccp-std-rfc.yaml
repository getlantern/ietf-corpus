document: rfc-6773
kind: normative-requirement
summary: DCCP-UDP implementations MUST follow DCCP-STD (RFC 4340 Section 14) for PMTUD, including processing ICMP Destination Unreachable 'Datagram Too Big' messages. The UDP encapsulation overhead reduces the Maximum Packet Size available at the DCCP level.
section: "3.7"
rfc2119_level: MUST
topics:
    - udp
    - nat
