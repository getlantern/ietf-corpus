document: rfc-7796
kind: normative-requirement
summary: For an untagged or VLAN-unaware AC port where the bridge module is a C-VLAN bridge, Ethernet frames received from root ACs MUST be tagged with a root C-VLAN. When the bridge module is an 802.1ad bridge, frames received from root ACs MUST be tagged with a root S-VLAN.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
