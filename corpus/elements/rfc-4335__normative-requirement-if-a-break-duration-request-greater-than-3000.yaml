document: rfc-4335
kind: normative-requirement
summary: If a BREAK duration request greater than 3000 ms is received, it SHOULD be interpreted as a request for a 3000 ms BREAK, to prevent an unreasonably long BREAK from making a port unavailable for up to 49.7 days.
section: "3"
rfc2119_level: SHOULD
topics:
    - security
