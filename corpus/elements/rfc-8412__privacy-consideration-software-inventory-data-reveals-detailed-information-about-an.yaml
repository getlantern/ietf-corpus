document: rfc-8412
kind: privacy-consideration
summary: Software inventory data reveals detailed information about an endpoint's configuration, which can be sensitive for both individuals and organizations. The NEA architecture allows an enterprise to collect comprehensive software inventory data; privacy protections must be considered in deployment, particularly when inventory data crosses trust boundaries.
