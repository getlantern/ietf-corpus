document: rfc-3877
kind: protocol-element
summary: 'The alarmActiveVariableTable stores all varbinds from the triggering Notification for each active alarm. Entries are always normalised to SNMPv2-Trap-PDU format: index 1 is sysUpTime, index 2 is snmpTrapOID, with subsequent varbinds following.'
