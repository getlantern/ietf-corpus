document: rfc-4969
kind: protocol-element
summary: The vCard Enumservice has type "vcard", no subtype, and supports URI schemes "http" and "https". It indicates that the resource identified is a plain vCard per RFC 2426, accessible via HTTP or HTTPS. Intended usage is COMMON.
