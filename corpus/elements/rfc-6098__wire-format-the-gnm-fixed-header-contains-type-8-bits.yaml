document: rfc-6098
kind: wire-format
summary: 'The GNM fixed header contains: Type (8 bits, value 22), MD (8 bits, message direction 0–5), A flag (1 bit, acknowledgement required), Reserved (15 bits, sent as 0), Home Address (32 bits), Home Agent Address (32 bits), Care-of Address (32 bits), and Identification (64 bits). Extensions follow the fixed portion.'
