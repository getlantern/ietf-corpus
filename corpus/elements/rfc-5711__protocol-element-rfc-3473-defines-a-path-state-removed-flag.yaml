document: rfc-5711
kind: protocol-element
summary: RFC 3473 defines a Path_State_Removed flag in the ERROR_SPEC object carried on a PathErr message. When set, this flag indicates that the message sender has removed Path state (and any associated Resv and data-plane state) for the TE LSP.
section: "2.2"
