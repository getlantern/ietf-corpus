document: rfc-3065
kind: normative-requirement
summary: The originating speaker SHALL include an empty AS_PATH attribute in UPDATE messages sent to BGP speakers in its own Member AS, include its Member AS Number in an AS_CONFED_SEQUENCE for intra-confederation neighbors, and include its confederation AS in an AS_SEQUENCE for external peers.
section: "6.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
