document: rfc-7909
kind: normative-requirement
summary: The signature method field "m" MUST specify hash and signature algorithms following RFC 6485 (the RPKI algorithm profile). Algorithms are referenced by their ASCII names within the signature attribute.
section: "2.1"
rfc2119_level: REQUIRED
