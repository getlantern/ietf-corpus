document: rfc-5179
kind: security-consideration
summary: It is important for security that the realm of a domain-based principal name be derived from the hostname component of the input, rather than from the domain name slots. Deriving the realm from the domain name slots instead would undermine the security properties of domain-based naming.
section: "5"
topics:
    - security
