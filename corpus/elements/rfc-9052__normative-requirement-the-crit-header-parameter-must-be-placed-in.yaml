document: rfc-9052
kind: normative-requirement
summary: The 'crit' header parameter MUST be placed in the protected-header-parameters bucket and its array MUST contain at least one value. If a label listed in 'crit' does not have a corresponding header parameter in the protected bucket, this is a fatal processing error.
section: "3.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
