document: rfc-4712
kind: wire-format
summary: 'The RAQMON PDU header occupies the first 32 bits: PDT (5 bits, value=1 for current version), B (1 bit, BASIC part present), T (3 bits, count of APP extensions), P (1 bit, padding present), S (1 bit, source IPv6), R (1 bit, receiver IPv6), RC (4 bits, record count), Length (16 bits, BASIC part length in 32-bit words minus one).'
section: 2.1.1
topics:
