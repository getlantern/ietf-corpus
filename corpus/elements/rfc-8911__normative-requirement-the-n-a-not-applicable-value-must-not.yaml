document: rfc-8911
kind: normative-requirement
summary: The 'N/A' (Not Applicable) value MUST NOT be used in the Identifier, Name, URI, Status, Requester, Revision, Revision Date, or Description columns; columns in other categories that are inapplicable to a given metric category SHOULD be populated with 'N/A'.
section: "7"
rfc2119_level: MUST NOT
topics:
