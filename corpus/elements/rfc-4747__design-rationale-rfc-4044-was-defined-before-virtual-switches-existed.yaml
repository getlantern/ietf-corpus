document: rfc-4747
kind: design-rationale
summary: RFC 4044 was defined before Virtual Switches existed and applied only to physical switches, so its tables were not read-create. This MIB introduces read-create tables (t11vfVirtualSwitchTable with RowStatus) to allow administrators to create Virtual Switches remotely via SNMP.
section: "5.2"
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
