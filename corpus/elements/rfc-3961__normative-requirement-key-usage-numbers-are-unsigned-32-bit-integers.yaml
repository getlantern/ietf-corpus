document: rfc-3961
kind: normative-requirement
summary: Key usage numbers are unsigned 32-bit integers and zero is not permitted. New protocols defined in terms of Kerberos encryption and checksum types should use their own key usage values distinct from those assigned to the core Kerberos protocol.
section: "2"
rfc2119_level: SHOULD
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
