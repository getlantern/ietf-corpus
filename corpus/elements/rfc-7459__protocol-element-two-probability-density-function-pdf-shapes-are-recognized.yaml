summary: 'Two probability density function (PDF) shapes are recognized for location uncertainty: normal (Gaussian, applicable when many small independent errors contribute) and rectangular (applicable when a single dominant error source spans a limited, uniform range). The pdf attribute on the confidence element conveys which shape applies.'
