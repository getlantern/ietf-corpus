document: rfc-4631
kind: normative-requirement
summary: When a new lmpControlChannelTable entry is created with lmpCcIsIf set to true(1), a corresponding entry MUST be created in ifTable (RFC 2863), and the control channel SHOULD be modeled with ifType lmp(227) with appropriate interface stacking.
