document: rfc-7015
kind: protocol-element
summary: 'Two Original Flow counting modes are defined: conservative counting (each Original Flow contributes exactly one to the total across all Aggregated Flows, with fractional distribution as needed) and non-conservative counting (each Contributing Flow presence in an Aggregated Flow adds one, so the total sum may exceed the Original Flow count).'
