document: rfc-4001
kind: wire-format
summary: 'InetAddressIPv4z encodes a non-global IPv4 address with zone index: octets 1-4 are the IPv4 address in network-byte order, octets 5-8 are the zone index in network-byte order (OCTET STRING SIZE 8). InetAddressIPv6z is similar: octets 1-16 IPv6 address, octets 17-20 zone index (OCTET STRING SIZE 20).'
