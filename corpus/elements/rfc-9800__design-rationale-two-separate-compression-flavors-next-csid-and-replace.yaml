document: rfc-9800
kind: design-rationale
summary: 'Two separate compression flavors (NEXT-CSID and REPLACE-CSID) are defined rather than a single mechanism because they serve different deployment needs: NEXT-CSID is optimized for smaller CSID lengths and pure LPM forwarding, while REPLACE-CSID supports wider CSID lengths and 32-bit compression better suited for networks requiring larger SID numbering spaces.'
section: "9.1"
