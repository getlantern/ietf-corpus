document: rfc-8618
kind: wire-format
summary: The 'name-rdata' BlockTable array stores each DNS NAME or RDATA in wire format as a byte string. Names and labels within RDATA are stored as full domain names with no DNS name compression (per RFC 1035); compression is only applied at the C-DNS block level through indexing.
section: 7.3.2.3
topics:
