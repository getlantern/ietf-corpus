document: rfc-8668
kind: security-consideration
summary: If IS-IS PDUs are sent over physical links where unauthorized access is possible, attacks against the L2 Bundle Member advertisements are possible. Use of IS-IS cryptographic authentication as defined in RFC 5304 and RFC 5310 is recommended to prevent such attacks.
section: "6"
topics:
    - routing
    - security
