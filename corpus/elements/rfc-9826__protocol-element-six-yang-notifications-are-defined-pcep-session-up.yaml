kind: protocol-element
summary: 'Six YANG notifications are defined: pcep-session-up, pcep-session-down, pcep-session-local-overload, pcep-session-local-overload-clear, pcep-session-peer-overload, and pcep-session-peer-overload-clear. These are semantic equivalents of the PCEP MIB (RFC 7420) notifications.'
