document: rfc-5511
kind: interoperability-note
summary: RBNF is primarily applicable to RSVP (RFC 2205), RSVP-TE (RFC 3209), GMPLS (RFC 3473), LMP (RFC 4204), and PCEP (RFC 5440), and extensions thereto. Using RBNF for wholly new protocols unrelated to these is not recommended; ABNF (RFC 5234) should be considered instead. Using RBNF to specify extensions to protocols that already use a different BNF form is explicitly not recommended.
section: "1.3"
topics:
    - routing
