document: rfc-4236
kind: wire-format
summary: The AM-Part named parameter for Data Use Mine (DUM) messages carries a single am-part token identifying which HTTP message part the DUM contains. An OCP agent MUST send AM-Part with every DUM message in an OCP transaction using an HTTP profile.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
