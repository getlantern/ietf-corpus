document: rfc-6030
kind: normative-requirement
summary: The <Key> element 'Id' attribute value MUST remain the same across multiple PSKC interactions referencing the same key (e.g., initial provisioning followed by metadata update), to enable stable key identification between parties.
section: "4.1"
rfc2119_level: MUST
topics:
