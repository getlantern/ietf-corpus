document: rfc-9749
kind: normative-requirement
summary: After calling PushSubscription/set, the client MUST check whether the sessionState in the response points to a session object whose applicationServerKey matches expectations. On mismatch, the client MAY retry and MAY destroy the failed PushSubscription.
section: "5"
rfc2119_level: MUST
topics:
    - http
    - crypto
