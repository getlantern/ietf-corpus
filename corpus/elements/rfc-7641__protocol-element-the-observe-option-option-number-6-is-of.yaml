document: rfc-7641
kind: protocol-element
summary: The Observe Option (option number 6) is of type 'uint', 0–3 bytes, with no default value. In a GET request it registers (value 0) or deregisters (value 1) client interest in a resource; in a response it identifies the message as a notification and carries a sequence number for reordering detection.
