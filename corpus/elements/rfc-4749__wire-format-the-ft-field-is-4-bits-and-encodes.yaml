kind: wire-format
summary: The FT field is 4 bits and encodes the frame type/encoding rate for all frames in the packet, with values 0–11 mapping to 8–32 kbps (20–80 octets per frame), values 12–14 reserved, and value 15 (NO_DATA) indicating an empty audio payload used only to update MBS.
