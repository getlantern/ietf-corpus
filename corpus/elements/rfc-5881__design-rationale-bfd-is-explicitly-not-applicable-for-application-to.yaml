document: rfc-5881
kind: design-rationale
summary: BFD is explicitly not applicable for application-to-application failure detection across the Internet because it lacks sufficient congestion detection and avoidance capability, which could cause congestion collapse. Host-to-host or application-to-application deployment would require BFD to be encapsulated within a transport providing TCP-friendly (TFRC) behavior.
section: "2"
topics:
    - routing
    - congestion
