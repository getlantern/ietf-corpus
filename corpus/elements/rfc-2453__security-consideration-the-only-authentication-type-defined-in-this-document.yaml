document: rfc-2453
kind: security-consideration
summary: 'The only authentication type defined in this document is type 2—a 16-octet plain-text password carried in the clear. This provides minimal security: the password is easily observable by any party that can capture RIP packets. A companion document defines cryptographic authentication improvements for RIP-2.'
section: "7"
topics:
