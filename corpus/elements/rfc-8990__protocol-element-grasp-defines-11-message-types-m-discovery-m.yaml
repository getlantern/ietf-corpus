document: rfc-8990
kind: protocol-element
summary: 'GRASP defines 11 message types: M_DISCOVERY, M_RESPONSE (discovery); M_REQ_NEG, M_NEGOTIATE, M_WAIT, M_END (negotiation); M_REQ_SYN, M_SYNCH, M_FLOOD (synchronization); M_NOOP and M_INVALID (housekeeping). Unrecognized types in unicast messages MAY elicit M_INVALID; in multicast they MUST be silently discarded.'
section: 2.8.1
