document: rfc-7599
kind: wire-format
summary: 'The MAP-T IPv6 Interface Identifier is 128-n-o-s bits wide and structured as: 16 bits of zeros, followed by a 32-bit IPv4 address field (right-padded with zeros for prefixes), followed by a 16-bit PSID field (left-padded with zeros). If the end-user IPv6 prefix length exceeds 64, the most significant parts of the interface identifier are overwritten by the prefix.'
