document: rfc-9305
kind: normative-requirement
summary: All shim protocols (Next Protocol 0x80-0xFD) MUST use the header structure in Figure 4 which includes a 'Next Protocol' field. When shim headers are used with protocols identified by Next Protocol values 0x00-0x7F, all shim headers MUST come first.
section: "3"
rfc2119_level: MUST
