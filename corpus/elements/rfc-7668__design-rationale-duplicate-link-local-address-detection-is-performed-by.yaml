document: rfc-7668
kind: design-rationale
summary: Duplicate link-local address detection is performed by the 6LBR at connection establishment rather than via DAD packets. This increases 6LBR complexity but reduces power consumption on both 6LN and 6LBR by eliminating mandatory DAD packet transmissions.
