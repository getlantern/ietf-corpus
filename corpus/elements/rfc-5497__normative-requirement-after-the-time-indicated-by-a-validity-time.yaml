document: rfc-5497
kind: normative-requirement
summary: After the time indicated by a VALIDITY_TIME TLV, the receiving node MUST consider the message content (or associated addresses) to no longer be valid unless repeated in a later message. A message MUST NOT include more than one VALIDITY_TIME TLV.
section: "7.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
