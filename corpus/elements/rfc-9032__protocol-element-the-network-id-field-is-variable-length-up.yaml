document: rfc-9032
kind: protocol-element
summary: The network ID field is variable length, up to 16 bytes, uniquely identifying the network among potentially overlapping networks. Its length is whatever remains in the IE after preceding fields. In 6TiSCH/RPL networks, it may be a truncated SHA-256 hash of the network prefix (/64).
