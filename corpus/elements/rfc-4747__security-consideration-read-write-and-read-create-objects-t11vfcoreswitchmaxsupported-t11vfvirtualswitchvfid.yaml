document: rfc-4747
kind: security-consideration
summary: Read-write and read-create objects (t11vfCoreSwitchMaxSupported, t11vfVirtualSwitchVfId, t11vfPortTaggingAdminStatus, t11vfPortVfId, t11vfLocallyEnabledRowStatus, and related StorageType/RowStatus objects) are sensitive because they allow remote reconfiguration of Virtual Fabrics on switches and ports; SET operations in non-secure environments can negatively affect network operations.
