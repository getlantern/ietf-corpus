document: rfc-5415
kind: security-consideration
summary: 'WTP firmware integrity is critical: a compromised firmware image could allow interception of wireless traffic or denial of service. The AC must validate firmware image authenticity before provisioning, and WTPs must validate images before executing them.'
section: "12.10"
