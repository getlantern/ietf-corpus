document: rfc-9869
kind: interoperability-note
summary: When the remote endpoint does not support UDP Options or does not return a RES Option, DPLPMTUD cannot confirm the path or discover the PLPMTU and will fall back to using the minimum configured PLPMTU (MIN_PLPMTU).
