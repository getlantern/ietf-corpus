document: rfc-1388
kind: interoperability-note
summary: A RIP-1 system will silently ignore an authentication entry because its AFI (0xFFFF) corresponds to an address family other than IP. Consequently, authentication alone does not prevent RIP-1 systems from receiving and processing the route entries in a RIP-2 packet; multicasting is required to achieve that separation.
section: "4.2"
topics:
    - routing
    - security
