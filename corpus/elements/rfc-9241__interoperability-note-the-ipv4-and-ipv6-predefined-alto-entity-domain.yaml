document: rfc-9241
kind: interoperability-note
summary: The 'ipv4' and 'ipv6' predefined ALTO entity domain types (RFC 9240) are reused to represent 'ipv4cidr' and 'ipv6cidr' CDNI footprint types respectively. Individual address entities translate to the corresponding CIDR footprint with the longest prefix (/32 for IPv4, /128 for IPv6).
