document: rfc-4724
kind: normative-requirement
summary: The Receiving Speaker MUST replace stale routes with routing updates received from the peer. Once the End-of-RIB marker for an address family is received, it MUST immediately remove any routes still marked stale for that address family.
section: "4.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
