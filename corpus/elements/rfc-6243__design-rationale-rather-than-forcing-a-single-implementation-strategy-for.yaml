document: rfc-6243
kind: design-rationale
summary: Rather than forcing a single implementation strategy for default data handling, the document allows servers to advertise their particular style (report-all, trim, or explicit) so clients can adjust accordingly. This acknowledges that not all server implementations treat default data the same way.
section: "2"
