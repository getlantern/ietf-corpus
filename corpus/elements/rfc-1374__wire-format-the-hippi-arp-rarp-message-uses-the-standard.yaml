document: rfc-1374
kind: wire-format
summary: The HIPPI ARP/RARP message uses the standard ARP format with ar$hrd=1 (16 bits), ar$pro=2048 (16 bits), ar$hln=6 (8 bits), ar$pln=4 (8 bits), ar$op (16 bits), plus 48-bit ULA and 32-bit IP address fields for both requester and target; the HIPPI-LE header carries the corresponding Switch Addresses in parallel.
section: Address Resolution/ARP and RARP Message Format
topics:
    - ip
