document: rfc-6225
kind: protocol-element
summary: 'Altitude uncertainty (AltUnc) is a 6-bit field encoding uncertainty in meters as: uncertainty = 2^(21 − x), encoded as x = 21 − ceil(log2(uncertainty)). A value of 0 means unknown; values above 30 are reserved. Altitude uncertainty applies only to AType=1 (meters).'
section: 2.4.5
topics:
    - ip
