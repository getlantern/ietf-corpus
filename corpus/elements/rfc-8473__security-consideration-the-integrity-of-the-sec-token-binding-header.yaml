document: rfc-8473
kind: security-consideration
summary: 'The integrity of the Sec-Token-Binding header must be protected: one eTLD+1 must not be able to set the Sec-Token-Binding header used by a User Agent with another eTLD+1. The ''Sec-'' prefix marks the header as a ''forbidden header name'' per the Fetch specification, preventing DOM APIs from setting it.'
section: "7.2"
topics:
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
