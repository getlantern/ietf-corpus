document: rfc-9005
kind: normative-requirement
summary: If at least one parameter in the POLICY-PARAMETERS-TLV is considered unacceptable (e.g., out of range, badly encoded), the PCEP speaker MUST reject the PCEP message and send a PCErr with Error-Type 26 'Association Error' and Error-value 13 'Unacceptable policy parameters'.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
