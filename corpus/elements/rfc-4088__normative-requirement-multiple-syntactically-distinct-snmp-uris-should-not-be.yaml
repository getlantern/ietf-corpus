document: rfc-4088
kind: normative-requirement
summary: Multiple syntactically distinct SNMP URIs SHOULD NOT be used to designate the same MIB object instance or set of instances, as this may cause unexpected results in URI-based systems that use string comparison to test URIs for equality.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
    - snmp
