document: rfc-9025
kind: design-rationale
summary: The MPLS DetNet encapsulation from RFC 8964 is mapped to the DetNet IP data plane by replacing F-Labels with UDP and IP headers, modeled on MPLS-over-UDP per RFC 7510. There may be zero or more F-Labels between the S-Label and the UDP header, giving flexibility in the degree of replacement.
section: "3"
topics:
