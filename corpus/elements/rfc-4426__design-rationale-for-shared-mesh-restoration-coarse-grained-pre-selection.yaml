document: rfc-4426
kind: design-rationale
summary: For shared mesh restoration, coarse-grained pre-selection (reserving at TE link level, deferring component link and label selection to activation time) allows flexibility but adds complexity during the time-critical restoration phase. Fine-grained pre-selection avoids this complexity at the cost of less flexibility.
