document: rfc-726
kind: design-rationale
summary: RCTE was motivated by RFC 357 (Davidson), which identified echoing delay on satellite links for full-duplex hosts. By having the using host echo locally under server instruction, round-trip delays of thousands of miles per character are avoided while maintaining full server responsiveness and clean terminal output.
section: "4"
