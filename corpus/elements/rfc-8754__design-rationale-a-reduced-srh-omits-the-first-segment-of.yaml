document: rfc-8754
kind: design-rationale
summary: A reduced SRH omits the first segment of the SR Policy (since it is already in the DA of the IPv6 header) and sets Last Entry to n-2, saving space when the source does not need to preserve the full SID list in the header.
section: 4.1.1
