document: rfc-3820
kind: security-consideration
summary: Since no mechanism enforces unique PC subject names, a Proxy Issuer could issue two PCs with identical names and keys but different rights, allowing substitution attacks that affect the effective rights of downstream PCs. Relying parties ultimately must trust all Proxy Issuers in the chain to behave properly.
section: "6.3"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
