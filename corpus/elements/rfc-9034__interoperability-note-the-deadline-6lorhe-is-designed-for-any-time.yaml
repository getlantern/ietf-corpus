summary: The Deadline-6LoRHE is designed for any time-synchronized 6LoWPAN network and is not limited to 6TiSCH; the document notes applicability to IPv6 over Bluetooth Low Energy mesh and Wi-SUN networks as well, provided those networks achieve adequate time synchronization.
