document: rfc-7521
kind: normative-requirement
summary: If an assertion used for client authentication is invalid for any reason, or if more than one client authentication mechanism is used, the authorization server MUST return an error response with error code 'invalid_client'.
section: 4.2.1
rfc2119_level: MUST
