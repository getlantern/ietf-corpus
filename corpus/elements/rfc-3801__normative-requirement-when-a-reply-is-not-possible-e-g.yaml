document: rfc-3801
kind: normative-requirement
summary: When a reply is not possible (e.g., telephone-answering message), the special address non-mail-user@domain SHOULD be used as the originator address. A conforming implementation MUST NOT permit a reply to any message originating from non-mail-user.
section: 4.1.2
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
