document: rfc-8865
kind: normative-requirement
summary: If the SDP 'fmtp' attribute is included in a 'dcsa' attribute for a T.140 data channel, the 'format' attribute parameter value MUST be set to 't140'. The 'cps' parameter indicates the maximum character transmission rate (characters per second, mean over any 10-second interval) the endpoint can receive; default is 30.
section: 4.2.1
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
