document: rfc-8970
kind: security-consideration
summary: Preview generation may enable denial-of-service attacks via excessive memory, CPU, or storage usage. Servers SHOULD log the client authentication identity on FETCH PREVIEW operations to facilitate tracking of abusive clients, and MAY limit resources used for preview generation.
