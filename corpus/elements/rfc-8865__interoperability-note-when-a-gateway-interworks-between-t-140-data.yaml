document: rfc-8865
kind: interoperability-note
summary: 'When a gateway interworks between T.140 data channels and RTP-based T.140 transport: redundancy is used on the RTP stream but not on the data channel; keepalives are handled at lower layers on the data channel but may need to be extracted or generated on the RTP side; and missing text markers should be inserted whenever data loss is detected in either direction.'
