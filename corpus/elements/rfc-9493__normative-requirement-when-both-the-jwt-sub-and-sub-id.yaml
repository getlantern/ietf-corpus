document: rfc-9493
kind: normative-requirement
summary: When both the JWT "sub" and "sub_id" Claims are present in a JWT, they MUST identify the same subject. Implementations MUST NOT rely on both claims simultaneously to determine the JWT Subject.
section: "4.1"
rfc2119_level: MUST
topics:
    - jose
    - oauth
    - security
