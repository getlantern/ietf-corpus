document: rfc-8278
kind: normative-requirement
summary: The Bulk Re-registration Flag (B) MUST NOT be set to 1 if the Registration Overwrite Flag (O) is set to 1, and vice versa. The O flag MUST be set to 0 in De-Registration requests.
section: "4.1"
rfc2119_level: MUST NOT
