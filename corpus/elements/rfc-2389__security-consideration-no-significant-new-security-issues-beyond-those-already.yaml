document: rfc-2389
kind: security-consideration
summary: No significant new security issues beyond those already in FTP are introduced by this extension. The FEAT command does allow users to enumerate server capabilities, but the same information could be obtained by probing commands; this capability-disclosure risk is not considered a serious threat warranting remedial action.
