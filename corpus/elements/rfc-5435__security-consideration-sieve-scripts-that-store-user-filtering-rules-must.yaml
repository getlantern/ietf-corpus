document: rfc-5435
kind: security-consideration
summary: Sieve scripts that store user filtering rules MUST be protected from unauthorized modification (to prevent mail diversion) and SHOULD be protected from unauthorized retrieval (as scripts may expose private information such as mailbox names or correspondent addresses).
