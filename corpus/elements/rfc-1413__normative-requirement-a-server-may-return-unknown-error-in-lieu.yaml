document: rfc-1413
kind: normative-requirement
summary: A server MAY return UNKNOWN-ERROR in lieu of any other specific error code to conceal information implied by the more specific code. If implemented, this feature MUST be configurable and MUST default to returning the proper specific error message.
section: "5"
rfc2119_level: MAY
topics:
