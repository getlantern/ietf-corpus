document: rfc-9670
kind: normative-requirement
summary: A server MUST reject any change to a Principal it doesn't allow with a 'forbidden' SetError. Where changes are supported, the server SHOULD allow updates to 'name', 'description', and 'timeZone' for the current user's own Principal.
section: "2.3"
rfc2119_level: MUST
topics:
    - json
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
