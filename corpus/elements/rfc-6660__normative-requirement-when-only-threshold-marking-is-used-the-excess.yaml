document: rfc-6660
kind: normative-requirement
summary: When only threshold-marking is used, the excess-traffic-meter SHOULD be disabled and MUST NOT trigger any packet marking; ETM packets MUST NOT be changed to any other codepoint, preserving the rule that ETM is always the most severe marking.
section: 5.2.3.2
rfc2119_level: MUST
topics:
    - ecn
    - diffserv
    - qos
