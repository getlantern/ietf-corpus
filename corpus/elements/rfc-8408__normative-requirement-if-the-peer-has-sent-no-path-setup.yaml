document: rfc-8408
kind: normative-requirement
summary: If the peer has sent no PATH-SETUP-TYPE-CAPABILITY TLV, the PCEP speaker MUST infer that the peer supports at least RSVP-TE. Inference of other PST support is outside the scope of this document.
