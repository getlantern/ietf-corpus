document: rfc-9491
kind: normative-requirement
summary: A classifier MUST use one NSH Service Path Identifier (SPI) for each SR policy so that different traffic flows can use the same NSH Service Function Path and different SR policies can coexist on the same SFP without conflict during SFF processing.
