document: rfc-8145
kind: protocol-element
summary: 'The two signaling mechanisms defined are both OPTIONAL: (1) an edns-key-tag EDNS(0) option sent with DNSKEY queries, and (2) periodic Key Tag queries (type NULL, class IN) sent to the authoritative server for the trust anchor zone. Each independently conveys the Key Tags of trust anchors used by the resolver.'
