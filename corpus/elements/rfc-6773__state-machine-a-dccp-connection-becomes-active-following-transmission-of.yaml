document: rfc-6773
kind: state-machine
summary: A DCCP connection becomes 'active' following transmission of a DCCP-Request and becomes 'inactive' after sending a DCCP-Close. Active connections are tracked as 6-tuples for demultiplexing; inactive connections release the 6-tuple association.
