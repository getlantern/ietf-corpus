document: rfc-1850
kind: protocol-element
summary: ospfNbrTable describes non-virtual OSPF neighbors indexed by ospfNbrIpAddr and ospfNbrAddressLessIndex. Fields include ospfNbrRtrId, ospfNbrOptions (bit mask for TOS support, external LSA capability, multicast, NSSA), ospfNbrPriority, ospfNbrState, ospfNbrLsRetransQLen, ospfNbmaNbrPermanence (dynamic/permanent), and ospfNbrHelloSuppressed.
section: "3.10"
topics:
    - routing
    - snmp
