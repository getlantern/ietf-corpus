document: rfc-5373
kind: security-consideration
summary: UAs implementing these extensions MUST be equipped with and MUST exercise a request-identity mechanism (e.g., SIP Digest Authentication, SIP Identity [RFC4474], or asserted identity [RFC3325]). Failure to verify caller identity either opens the door to a wide range of attacks or requires policy so tight as to make the extensions useless.
section: "7.3"
rfc2119_level: MUST
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
