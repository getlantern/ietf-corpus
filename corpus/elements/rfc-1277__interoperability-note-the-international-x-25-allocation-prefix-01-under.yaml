document: rfc-1277
kind: interoperability-note
summary: The International X.25 allocation (Prefix 01 under IDI 007 28722) is only used where a CUDF or PID is needed. In all other international X.25 cases, an X.121 form Network Address with no DSP should be used instead.
section: A.1
topics:
    - routing
