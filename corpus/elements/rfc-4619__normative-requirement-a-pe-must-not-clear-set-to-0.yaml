document: rfc-4619
kind: normative-requirement
summary: A PE MUST NOT clear (set to 0) the DE bit if it was received with a value of 1. The DE bit MAY be set by ingress frame policing if not already set, but clearing it is prohibited.
section: 7.5.1
rfc2119_level: MUST NOT
topics:
    - mpls
