document: rfc-7644
kind: security-consideration
summary: Bearer tokens and cookies carry authentication state and MUST be protected using TLS to prevent interception; tokens issued based on weak or no authentication SHOULD NOT be used except as single-use tokens for anonymous registration.
section: "7.4"
