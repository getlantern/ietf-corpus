document: rfc-6455
kind: wire-format
summary: 'The base WebSocket frame header consists of: FIN (1 bit), RSV1-3 (1 bit each), opcode (4 bits), MASK (1 bit), payload length (7 bits, extended to 7+16 or 7+64 bits when the 7-bit value is 126 or 127), an optional 32-bit masking key (present when MASK=1), and variable-length payload data.'
section: "5.2"
topics:
    - websocket
