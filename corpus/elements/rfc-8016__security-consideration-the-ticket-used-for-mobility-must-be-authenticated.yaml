document: rfc-8016
kind: security-consideration
summary: The ticket used for mobility MUST be authenticated and encrypted with strong cryptographic algorithms and MUST have strong entropy. This prevents modification or eavesdropping by an attacker and ensures that allocation ownership cannot be determined from the ticket contents alone.
section: "5"
topics:
