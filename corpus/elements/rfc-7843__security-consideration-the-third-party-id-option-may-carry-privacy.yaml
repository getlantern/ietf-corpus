document: rfc-7843
kind: security-consideration
summary: The THIRD_PARTY_ID option may carry privacy-sensitive information in its deployment-specific identifier. It is RECOMMENDED to use identifiers without privacy concerns; means to protect unauthorized access MUST be in place, and the identifier MUST only be accessible by the network operator and handled on operator equipment.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - privacy
    - pcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
