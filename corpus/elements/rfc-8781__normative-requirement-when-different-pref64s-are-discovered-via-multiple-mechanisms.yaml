document: rfc-8781
kind: normative-requirement
summary: 'When different PREF64s are discovered via multiple mechanisms, hosts SHOULD select one source only. The RECOMMENDED priority order is: PCP-discovered prefixes (RFC 7225), then RA PREF64 option, then RFC 7050 DNS-based discovery.'
section: "5.1"
rfc2119_level: RECOMMENDED
topics:
