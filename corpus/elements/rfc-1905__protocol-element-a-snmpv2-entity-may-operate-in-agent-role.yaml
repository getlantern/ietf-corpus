document: rfc-1905
kind: protocol-element
summary: A SNMPv2 entity may operate in agent role (responds to requests, sends traps), manager role (initiates requests, receives traps/informs), or both. It may also act as a proxy agent, appearing to be an agent while satisfying requests by acting as a manager toward a remote entity.
section: "2.1"
topics:
