document: rfc-4917
kind: wire-format
summary: The Message String Extension has a 1-byte Type field (value 145), a 1-byte Length field (total extension bytes minus Type and Length fields), a 1-byte Sub-Type field (1=Home Agent, 2=Foreign Agent), and a variable-length Text field. The Length field MUST be set to 1 plus the total length of the Text field.
section: "3"
topics:
