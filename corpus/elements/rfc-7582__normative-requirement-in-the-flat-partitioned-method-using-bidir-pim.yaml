document: rfc-7582
kind: normative-requirement
summary: In the Flat Partitioned Method using BIDIR-PIM, each advertised P-tunnel MUST have a distinct P-group address; using MP2MP LSPs, each P-tunnel MUST have a distinct MP2MP FEC (distinct combination of root node and opaque value), and the advertising PE MUST be the PE identified in the root node field of the FEC.
section: 3.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
