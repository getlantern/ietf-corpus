document: rfc-8981
kind: normative-requirement
summary: The secret_key used in the PRF-based IID algorithm MUST be at least 128 bits and MUST be initialized to a pseudorandom number at OS bootstrap. It MUST NOT be employed for any other purpose, and specifically MUST NOT be shared with the stable-address generation algorithm of RFC 7217.
section: 3.3.2
rfc2119_level: MUST
topics:
    - ip
    - crypto
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
