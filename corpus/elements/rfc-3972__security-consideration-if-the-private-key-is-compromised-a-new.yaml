document: rfc-3972
kind: security-consideration
summary: If the private key is compromised, a new signature key and new CGA SHOULD be generated. Address change effectively revokes the old public key; no additional key revocation mechanism is needed.
section: "7.1"
rfc2119_level: SHOULD
