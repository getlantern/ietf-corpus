document: rfc-8685
kind: wire-format
summary: The H-PCE-FLAG TLV (Type=15, Length=4) is carried in the RP object to control H-PCE path computation options. Its 32-bit Flags field includes the D bit (bit 30, disallow domain re-entry) and the S bit (bit 31, request domain sequence only).
