summary: The "Pseudowire Associated Channel Types" registry (previously in IANA-PWE3) was renamed to "MPLS Generalized Associated Channel (G-ACh) Types (including Pseudowire Associated Channel Types)" and moved into the new G-ACh Parameters registry. At the time of publication, allocations from RFCs 4385, 5586, 5718, 5885, 6374, 6378, 6426, 6427, 6428, 6435, 6478, and 6671 were included.
