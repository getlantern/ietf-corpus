document: rfc-3014
kind: security-consideration
summary: Contention between multiple managers setting nlmConfigGlobalEntryLimit or nlmConfigGlobalAgeOut to different values can be exploited to orchestrate a denial-of-service attack by causing Notifications to be deleted before other applications can read them. Methods for countering such attacks are noted as for further study.
section: 2.1.2
topics:
    - snmp
    - security
