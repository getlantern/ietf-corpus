document: rfc-3398
kind: normative-requirement
summary: If a CANCEL or BYE is received before a final SIP response has been sent, a '200 OK' MUST be sent to confirm the request and a '487 Request Terminated' MUST also be sent to terminate the INVITE transaction. A REL SHOULD be sent to the PSTN with cause value 16 (normal clearing).
section: 7.2.3
rfc2119_level: MUST
topics:
    - sip
    - voip
