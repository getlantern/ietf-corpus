document: rfc-9461
kind: normative-requirement
summary: If the "alpn" SvcParamKey is absent, the client MUST treat the SVCB record as "incompatible" unless some other recognized SvcParam indicates a supported protocol. There is no default protocol for the "dns" scheme, so "no-default-alpn" does not apply.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
