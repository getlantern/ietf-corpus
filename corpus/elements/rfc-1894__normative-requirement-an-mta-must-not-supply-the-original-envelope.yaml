document: rfc-1894
kind: normative-requirement
summary: An MTA MUST NOT supply the Original-Envelope-Id field unless an envelope-identifier was present in the envelope when the message arrived at the Reporting MTA (except when the DSN is issued by the sender's own MTA). The envelope-id is case-sensitive and MUST be preserved exactly.
section: 2.2.1
rfc2119_level: MUST NOT
topics:
    - email
