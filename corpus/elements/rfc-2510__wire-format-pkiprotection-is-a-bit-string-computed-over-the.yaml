summary: 'PKIProtection is a BIT STRING computed over the DER encoding of ProtectedPart ::= SEQUENCE { header PKIHeader, body PKIBody }. Three protection modes are defined: shared-secret MAC (PasswordBasedMac), DH-derived MAC (DHBasedMac), and digital signature.'
