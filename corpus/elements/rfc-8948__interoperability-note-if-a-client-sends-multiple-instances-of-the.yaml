document: rfc-8948
kind: interoperability-note
summary: If a client sends multiple instances of the IA_LL option in the same message, the DHCP relay MAY add only a single instance of the QUAD option covering all of them. Servers process OPTION_SLAP_QUAD from both the Relay-forward message and the client message payload and select which to apply based on server policy.
section: "3.2"
topics:
    - ip
