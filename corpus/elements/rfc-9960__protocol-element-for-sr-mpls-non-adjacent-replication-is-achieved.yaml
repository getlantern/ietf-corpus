document: rfc-9960
kind: protocol-element
summary: For SR-MPLS, non-adjacent replication is achieved by inserting one or more SIDs before the downstream Replication-SID. For SRv6, the LOC portion of the downstream Replication-SID guides the packet, or an optional segment list steers it on a specific path.
