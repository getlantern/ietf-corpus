document: rfc-7044
kind: privacy-consideration
summary: The hi-targeted-to-uri values can reveal retargeting paths and user identities. The Privacy Service defined in RFC 3323 MUST also support the 'history' priv-value and anonymize hi-entries by replacing user-portion with 'anonymous' and domain with 'anonymous.invalid'. Privacy header fields embedded in hi-targeted-to-uris MUST be removed after processing.
section: "10.1"
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
