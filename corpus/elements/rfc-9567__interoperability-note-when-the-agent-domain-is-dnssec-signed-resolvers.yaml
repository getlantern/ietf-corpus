document: rfc-9567
kind: interoperability-note
summary: When the agent domain is DNSSEC-signed, resolvers employing aggressive use of DNSSEC-validated cache (RFC 8198) can synthesize responses using NSEC/NSEC3 records, preventing report queries from reaching the monitoring agent even without an explicit cached answer.
section: "8.2"
topics:
