document: rfc-7796
kind: design-rationale
summary: The solution reuses the IEEE 802.1Q two-VLAN mechanism (one Root VLAN, one Leaf VLAN) rather than developing a new mechanism such as using PW control words or separate PWs to indicate root/leaf attributes. A new mechanism would introduce complexity for interworking with 802.1Q-based Ethernet domains.
section: "1"
topics:
