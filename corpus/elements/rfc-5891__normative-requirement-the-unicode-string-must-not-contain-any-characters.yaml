document: rfc-5891
kind: normative-requirement
summary: The Unicode string MUST NOT contain any characters whose validity is context-dependent unless positively confirmed by a contextual rule. Each CONTEXTJ or CONTEXTO code point MUST have a non-null rule; if the rule is missing, null, or produces a negative result, the label is invalid.
section: 4.2.3.3
rfc2119_level: MUST
topics:
    - dns
