document: rfc-6527
kind: design-rationale
summary: IPv4 and IPv6 virtual routers are treated as two separate logical entities, each represented as a separate row in vrrpv3OperationsTable. This choice was made because RFC 5798 behavior in a multi-stack scenario is undefined, and no consensus could be reached on an alternative interpretation.
section: "7"
