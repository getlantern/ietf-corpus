document: rfc-6638
kind: protocol-element
summary: CALDAV:schedule-inbox-URL is a WebDAV property on principal resources that identifies the URL of the principal's Scheduling Inbox collection. If absent, the calendar user is not enabled for reception of scheduling messages on the server.
section: 2.2.1
topics:
    - http
