document: rfc-8661
kind: interoperability-note
summary: SR-mapping advertisement for a given prefix provides no information about Penultimate Hop Popping (PHP). Other mechanisms, such as IGP-specific mechanisms defined in RFC 8665, RFC 8666, and RFC 8667, MAY be used to determine PHP in such cases.
section: "3.2"
topics:
