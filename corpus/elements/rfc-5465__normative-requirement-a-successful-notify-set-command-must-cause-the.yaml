document: rfc-5465
kind: normative-requirement
summary: A successful NOTIFY SET command MUST cause the server to immediately return any accumulated changes to the currently selected mailbox (if any), such as flag changes and new or expunged messages. A successful NOTIFY SET thus implies an implicit NOOP.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
