document: rfc-3986
kind: interoperability-note
summary: Some parsers allow a scheme name to be present in a relative reference when it is identical to the base URI scheme — a loophole in prior specifications. Its use should be avoided but is permitted for backward compatibility with implementations following RFC 1630.
section: 5.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
