document: rfc-5465
kind: protocol-element
summary: The FlagChange event covers MessageRead, MessageTrash, FlagsSet, and FlagsClear events from RFC 5423. For the selected mailbox, notification is an unsolicited FETCH response including UID and FLAGS/ANNOTATION items; for other mailboxes, a STATUS response is sent.
