document: rfc-7178
kind: security-consideration
summary: Incorrect or missing advertisement of RBridge Channel Protocol support in an RBridge's LSP could deny channel services (e.g., BFD) or cause channel messages to be sent to RBridges that do not support the feature, potentially resulting in inner frames being decapsulated and sent out Appointed Forwarder ports.
section: "8"
topics:
    - security
    - routing
