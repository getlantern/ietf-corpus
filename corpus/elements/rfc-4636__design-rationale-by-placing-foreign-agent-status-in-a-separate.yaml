document: rfc-4636
kind: design-rationale
summary: By placing foreign agent status in a separate extension rather than overwriting the Registration Reply's Code field, the mobile node can independently verify the Home Agent's reply integrity via the Mobile-Home Authentication Extension while still receiving the foreign agent's error information.
