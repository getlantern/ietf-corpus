document: rfc-6857
kind: normative-requirement
summary: Applying Encapsulation to the 'Received:' header field is prohibited. Only Message-ID, In-Reply-To, References, Original-Recipient, and Final-Recipient fields may use encapsulation downgrading.
section: 3.1.10
