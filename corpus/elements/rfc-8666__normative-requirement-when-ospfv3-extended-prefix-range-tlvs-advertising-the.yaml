document: rfc-8666
kind: normative-requirement
summary: When OSPFv3 Extended Prefix Range TLVs advertising the exact same range appear in multiple LSAs of the same type from the same router, the LSA with the numerically smallest Instance ID MUST be used and subsequent instances MUST be ignored.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
