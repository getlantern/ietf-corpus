document: rfc-9810
kind: normative-requirement
summary: It is RECOMMENDED that clients populate transactionID with 128 bits of pseudo-random data at transaction start to minimize collision probability; senderNonce is likewise typically 128 bits of random data and recipNonce MUST copy the previous message's senderNonce.
section: 5.1.1
rfc2119_level: RECOMMENDED
topics:
