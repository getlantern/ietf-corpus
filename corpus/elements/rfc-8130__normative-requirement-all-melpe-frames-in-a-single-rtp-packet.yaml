document: rfc-8130
kind: normative-requirement
summary: All MELPe frames in a single RTP packet MUST be of the same coder bitrate. Dynamic switching between frame rates within an RTP stream is only permitted if supported by both ends and reserved bits are filled in as per Table 7.
section: "3.3"
rfc2119_level: MUST
topics:
