document: rfc-6473
kind: normative-requirement
summary: When a vCard property represents some aspect of the application itself, it makes no sense to include "work" or "home" values of the TYPE parameter, since software applications do not have workplaces or personal lives.
section: "2"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
