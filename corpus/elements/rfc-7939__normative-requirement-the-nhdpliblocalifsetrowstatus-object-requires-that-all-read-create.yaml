document: rfc-7939
kind: normative-requirement
summary: The nhdpLibLocalIfSetRowStatus object requires that all read-create objects (which have no DEFVAL clauses) MUST be administratively specified by the management station before the row can transition to 'active(1)'. Updated values MUST be reflected in NHDP and MUST be written to nonvolatile storage.
section: "7"
rfc2119_level: MUST
topics:
    - routing
