document: rfc-2177
kind: protocol-element
summary: The IDLE command is sent from client to server to signal readiness to accept unsolicited mailbox update messages. The server responds with a continuation ('+') response, and the command remains active until the client sends 'DONE'. While active, the server may send untagged EXISTS, EXPUNGE, and other messages at any time.
