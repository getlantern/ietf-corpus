document: rfc-5666
kind: protocol-element
summary: xdr_read_chunk adds a uint32 position field (XDR stream offset) to an xdr_rdma_segment, indicating where the chunk data logically belongs in the XDR stream. A position of zero indicates the entire RPC message body is supplied as a chunk (the long-message RDMA_NOMSG case).
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
