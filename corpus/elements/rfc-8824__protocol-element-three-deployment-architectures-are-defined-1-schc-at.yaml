summary: 'Three deployment architectures are defined: (1) SCHC at the LPWAN boundary compressing the full IPv6/UDP/CoAP stack at the NGW; (2) end-to-end standalone CoAP SCHC compression with DTLS protection; (3) two-level OSCORE compression with separate Inner and Outer SCHC Rules and contexts.'
