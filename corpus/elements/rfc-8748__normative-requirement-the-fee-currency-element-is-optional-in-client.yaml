document: rfc-8748
kind: normative-requirement
summary: The <fee:currency> element is OPTIONAL in client commands; if absent, the server MUST determine the currency from server defaults or client account settings agreed via an out-of-band channel. However, the <fee:currency> element MUST be present in all server responses.
section: "3.2"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
