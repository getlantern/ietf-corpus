document: rfc-3558
kind: protocol-element
summary: The Mode Request field (3 bits, MMM) in the packet header signals the receiver to set a particular encoding mode on its audio encoder, affecting the reverse-direction bit rate. The sender SHOULD continue sending the same value until the mode changes to handle packet loss.
section: "10"
