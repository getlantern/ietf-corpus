document: rfc-7484
kind: protocol-element
summary: AS number lookups match against inclusive ranges expressed as 'LOW-HIGH' decimal strings in the Bootstrap Registry for AS Number Space. A single AS number is encoded as a range of two identical values (e.g., '2045-2045').
