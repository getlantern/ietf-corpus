document: rfc-8267
kind: interoperability-note
summary: Some RDMA transports (such as InfiniBand Reliable Connections) have no keep-alive mechanism; without new RPC traffic, connections can remain alive long after a server becomes unresponsive, eventually exhausting all RPC-over-RDMA credits and blocking further requests.
section: 6.7.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
