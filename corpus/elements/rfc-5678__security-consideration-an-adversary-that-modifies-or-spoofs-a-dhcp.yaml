document: rfc-5678
kind: security-consideration
summary: An adversary that modifies or spoofs a DHCP response could direct a mobile node to a rogue Mobility Server, which could then supply incorrect handover information, events, or commands. DHCP authentication per RFC 3118 is recommended where available to prevent both message tampering and denial-of-service attacks against DHCP servers.
section: "7"
topics:
    - security
    - mobility
