document: rfc-9241
kind: normative-requirement
summary: If the 'cdni-capabilities' list in a filtered request is empty, the ALTO server MUST interpret it as a request for the full CDNI Advertisement resource. The server MUST interpret duplicate entries as if they appeared only once, and MUST omit capabilities for which no footprints are defined.
section: "5.3"
rfc2119_level: MUST
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
