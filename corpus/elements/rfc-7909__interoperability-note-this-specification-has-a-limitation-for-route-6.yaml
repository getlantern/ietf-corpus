document: rfc-7909
kind: interoperability-note
summary: 'This specification has a limitation for route[6] objects: only a single signature per object is supported. This means route[6] objects where one resource holder holds the ASN and another holds the prefix cannot both be properly signed under this version of the specification.'
section: "4"
topics:
