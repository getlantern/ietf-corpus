document: rfc-2790
kind: security-consideration
summary: Read-write objects (hrSystemDate, hrSystemInitialLoadDevice, hrStorageSize, hrSWRunStatus, etc.) can negatively affect system operations if SET operations are permitted in a non-secure environment; SNMPv3 with User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) is recommended.
section: "7"
topics:
