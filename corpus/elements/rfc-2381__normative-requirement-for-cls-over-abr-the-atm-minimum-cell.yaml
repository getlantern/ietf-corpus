document: rfc-2381
kind: normative-requirement
summary: For CLS over ABR, the ATM Minimum Cell Rate (MCR) MUST be directly converted from the token bucket rate of the receiver TSpec. ABR with a positive MCR aligns with the CLS concept of 'best effort with a floor.'
section: 2.1.2
rfc2119_level: MUST
topics:
    - ip
    - qos
    - congestion
