document: rfc-1509
kind: protocol-element
summary: gss_init_sec_context initiates security context establishment with a remote peer. It consumes an input_token (GSS_C_NO_BUFFER on first call), optional channel bindings, req_flags, and target_name, and returns an output_token for transfer to the acceptor plus ret_flags indicating which services the established context actually supports.
section: "3.3"
topics:
    - security
    - crypto
