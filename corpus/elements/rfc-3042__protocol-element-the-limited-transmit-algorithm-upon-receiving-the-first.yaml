summary: 'The Limited Transmit algorithm: upon receiving the first two consecutive duplicate ACKs, the sender transmits one new previously unsent data segment per duplicate ACK, subject to the receiver''s advertised window and the constraint that outstanding data does not exceed cwnd + 2 segments.'
