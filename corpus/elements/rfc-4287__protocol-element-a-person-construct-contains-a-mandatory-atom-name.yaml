document: rfc-4287
kind: protocol-element
summary: A Person construct contains a mandatory atom:name element (exactly one), an optional atom:uri element (IRI reference, at most one), and an optional atom:email element conforming to the addr-spec production of RFC 2822 (at most one). Used by atom:author and atom:contributor.
