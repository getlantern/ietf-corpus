document: rfc-2021
kind: security-consideration
summary: Security considerations are addressed in Section 7. The RMON 2 MIB contains numerous read-write and read-create objects; unauthorized write access could allow an attacker to reconfigure probe monitoring functions, reassign data sources, delete collected data, or exhaust probe resources by creating excessive control entries.
section: "7"
topics:
    - snmp
    - security
