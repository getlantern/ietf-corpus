document: rfc-5276
kind: normative-requirement
summary: For each id-swb-ers OID except id-swb-ers-pkc-cert and id-swb-ers-revocation-info, the evidence record MUST be calculated over the value field of the corresponding replyWantBack; the tag and length bytes are not covered by the evidence record.
