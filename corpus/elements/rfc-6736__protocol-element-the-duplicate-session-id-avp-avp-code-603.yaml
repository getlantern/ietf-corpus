document: rfc-6736
kind: protocol-element
summary: The Duplicate-Session-Id AVP (AVP Code 603, UTF8String) carries the Session-Id of an already-existing DNCA session when the NAT device returns SESSION_EXISTS, enabling the NAT controller to identify and optionally terminate the conflicting older session via STR.
