document: rfc-1123
kind: normative-requirement
summary: 'A Server-FTP MUST return the actual unique file name in the 125 or 150 reply to STOU, in the format ''125 FILE: pppp'' or ''150 FILE: pppp''. The 250 reply code mentioned in RFC-959 for STOU is incorrect.'
section: 4.1.2.9
rfc2119_level: MUST
