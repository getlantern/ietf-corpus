document: rfc-8831
kind: wire-format
summary: Because SCTP does not support empty user messages, an empty JavaScript string or binary value is encoded as a one-zero-byte SCTP user message carrying the appropriate Empty PPID (56 or 57). Receivers identify and discard the padding byte.
section: "6.6"
