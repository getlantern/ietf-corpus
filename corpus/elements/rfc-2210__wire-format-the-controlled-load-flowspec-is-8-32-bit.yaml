summary: 'The Controlled-Load FLOWSPEC is 8 32-bit words identical in structure to the SENDER_TSPEC except that the per-service header carries service_number=5 (Controlled-Load). Fields are: [r], [b], [p] (IEEE floats), [m], [M] (32-bit ints) as parameter 127.'
