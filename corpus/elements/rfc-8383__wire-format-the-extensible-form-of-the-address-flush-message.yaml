document: rfc-8383
kind: wire-format
summary: The Extensible form of the Address Flush message is indicated by a zero in the K-VLBs byte, followed by TLVs. Each TLV has an 8-bit Type, an 8-bit Length (in bytes after the Length byte), and a variable-length Value field. TLV types 1-8 are defined for Blocks of VLANs, Bit Map of VLANs, Blocks of FGLs, List of FGLs, Bit Map of FGLs, All Data Labels, MAC Address List, and MAC Address Blocks.
section: "2.2"
topics:
    - routing
