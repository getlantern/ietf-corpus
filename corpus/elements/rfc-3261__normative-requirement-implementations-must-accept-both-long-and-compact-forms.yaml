document: rfc-3261
kind: normative-requirement
summary: Implementations MUST accept both long and compact forms of each header name (e.g., 'Via' and 'v', 'From' and 'f', 'To' and 't', 'Contact' and 'm'). A compact form MAY be substituted for the longer form at any time without changing message semantics.
section: 7.3.3
rfc2119_level: MUST
topics:
    - sip
