document: rfc-4271
kind: normative-requirement
summary: The NEXT_HOP attribute MUST NOT be set to the IP address of the receiving speaker, and a BGP speaker SHALL NOT install a route with itself as the next hop. The NEXT_HOP MUST be resolvable via the local Routing Table.
section: 5.1.3
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
