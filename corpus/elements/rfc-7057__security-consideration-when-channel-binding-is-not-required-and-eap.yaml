document: rfc-7057
kind: security-consideration
summary: When channel binding is not required and EAP authentication is introduced into an existing non-network-access service, a device can be created that impersonates a NAS to peers while proxying authentication to the new application service. This may decrease security even for users who previously used non-EAP authentication.
section: "2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
