document: rfc-5521
kind: protocol-element
summary: Path-Key Subobjects (PKSs) from RFC 5520 may appear as XRO subobjects to support inter-domain diverse path computation where segments of the primary path are kept confidential. The L bit of the PKS subobject in the XRO MUST be ignored.
section: 3.1.1
topics:
    - routing
    - mpls
