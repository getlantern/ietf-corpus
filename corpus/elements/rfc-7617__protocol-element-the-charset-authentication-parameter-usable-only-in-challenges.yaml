document: rfc-7617
kind: protocol-element
summary: The 'charset' authentication parameter, usable only in challenges, allows servers to indicate their preferred character encoding for the user-pass octet sequence. The only allowed value is "UTF-8" (case-insensitive), indicating NFC normalization followed by UTF-8 encoding.
section: "2.1"
topics:
