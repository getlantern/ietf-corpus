document: rfc-8191
kind: normative-requirement
summary: If HNP renumbering occurs with LMA switchover, hard mode is RECOMMENDED to keep the protocol simple; in this mode the LMA deletes the old HNP binding state after receiving the UPA message and silently discards packets to the old HNP.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - mobility
    - ip
