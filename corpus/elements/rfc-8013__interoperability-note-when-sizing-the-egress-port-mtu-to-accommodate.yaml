document: rfc-8013
kind: interoperability-note
summary: 'When sizing the egress port MTU to accommodate inter-FE metadata overhead, care must be taken not to report an MTU below the protocol minimums: 64 octets for IPv4 (RFC 791) and 1280 octets for IPv6 (RFC 2460).'
section: 5.1.1
topics:
