document: rfc-2932
kind: protocol-element
summary: ipMRouteNextHopClosestMemberHops (Integer32) records the minimum number of hops between this router and any member of the multicast group reachable via this next-hop; datagrams with a TTL less than this value will not be forwarded to this next-hop.
