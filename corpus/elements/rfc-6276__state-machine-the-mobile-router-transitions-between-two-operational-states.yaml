document: rfc-6276
kind: state-machine
summary: 'The mobile router transitions between two operational states: (1) at-home, where it acts only as DHCPv6 requesting router communicating directly over the home link with relay disabled; and (2) away-from-home, where it additionally acts as a co-located DHCPv6 relay agent forwarding messages via the Mobile IPv6 tunnel to the home agent.'
