document: rfc-5256
kind: protocol-element
summary: 'The ''sent date'' is the date and time from the Date: header, adjusted by time zone to normalize to UTC. If no valid Date: header is present or parseable, the message''s INTERNALDATE is used as the sent date. When two sent dates match exactly, sequence number order is used as a tie-breaker.'
section: "2.2"
topics:
    - email
