document: rfc-5401
kind: design-rationale
summary: The building blocks approach is used because different protocol instantiations are required for different application and network architecture demands, yet fundamental components are common across instantiations. Building blocks can be combined and parameterized to address a wide range of requirements while defaulting to a general-purpose 'bulk data transfer' configuration.
