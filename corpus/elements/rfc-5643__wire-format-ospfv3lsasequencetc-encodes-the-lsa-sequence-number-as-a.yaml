summary: Ospfv3LsaSequenceTC encodes the LSA sequence number as a signed 32-bit integer (Integer32), starting at 0x80000001 and incrementing to 0x7FFFFFFF. A larger value indicates a more recent advertisement; the space is linearly ordered.
