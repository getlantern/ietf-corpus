document: rfc-8249
kind: protocol-element
summary: Lz is the link-wide minimum acceptable inter-RBridge MTU size on a local link, computed as the minimum originatingSNPBufferSize advertised by all RBridges on that link but not less than Sz. Link-scoped PDUs may be sized up to Lz rather than the campus-wide Sz.
