document: rfc-4759
kind: normative-requirement
summary: When a VoIP network element queries ENUM and the result includes a NAPTR record containing a "tel" URI with the same E.164 number or with "enumdi" already set, and that URI is passed to another network element, the sending element MUST pass on the URI with the "enumdi" parameter set.
section: 4.2.3
rfc2119_level: MUST
topics:
    - voip
    - dns
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
