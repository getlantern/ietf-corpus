document: rfc-6134
kind: security-consideration
summary: External data controlling Sieve script behavior gives whoever controls that data unusual power over email disposition. Tampering with an external list could cause important mail to be discarded or redirected to unintended recipients. Security and integrity protection of external lists is as important as protection of the Sieve script itself.
section: "3"
topics:
    - email
    - security
