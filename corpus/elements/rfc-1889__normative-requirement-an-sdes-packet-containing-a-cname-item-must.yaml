document: rfc-1889
kind: normative-requirement
summary: An SDES packet containing a CNAME item must be included in each compound RTCP packet so that receivers can identify the source and begin associating media for lip-sync as soon as possible.
section: "6.1"
rfc2119_level: MUST
topics:
