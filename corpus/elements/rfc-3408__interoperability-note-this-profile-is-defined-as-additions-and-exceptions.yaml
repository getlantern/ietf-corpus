document: rfc-3408
kind: interoperability-note
summary: This profile is defined as additions and exceptions to RFC 3242, extending it with R-mode zero-byte support. All terminology is the same as in RFC 3242, and RFC 3242 rules for AL NHP determination apply with one modification for the R-mode unsafe condition.
