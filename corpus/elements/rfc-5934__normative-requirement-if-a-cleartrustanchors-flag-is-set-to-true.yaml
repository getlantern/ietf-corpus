document: rfc-5934
kind: normative-requirement
summary: If a clearTrustAnchors flag is set to TRUE in a valid Apex Trust Anchor Update, all management and identity trust anchors in the trust anchor store MUST be deleted, leaving the new apex trust anchor as the only trust anchor. Similarly, if clearCommunities is TRUE, all community identifiers MUST be deleted.
section: "4.5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
