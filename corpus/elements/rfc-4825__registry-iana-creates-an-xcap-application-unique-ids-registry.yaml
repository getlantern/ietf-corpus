document: rfc-4825
kind: registry
summary: IANA creates an 'XCAP Application Unique IDs' registry. AUIDs in the IETF namespace are registered by publication of a standards-track RFC per the guidelines in Section 15. Vendor-proprietary AUIDs use a reverse-domain-name prefix (e.g., 'com.example.foo') and do not require IANA registration.
section: "15.1"
topics:
    - registry
    - http
