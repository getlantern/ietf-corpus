document: rfc-2368
kind: design-rationale
summary: Only the Subject, Keywords, and Body headers are believed to be both safe and useful for mailto URLs. Clients cannot expect resolvers to handle more than "subject" and "body" headers and should correctly create RFC 822-compliant messages using at least those two.
section: "4"
topics:
    - email
    - security
