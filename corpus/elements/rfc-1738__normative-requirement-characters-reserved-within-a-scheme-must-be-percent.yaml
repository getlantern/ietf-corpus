document: rfc-1738
kind: normative-requirement
summary: Characters reserved within a scheme (';', '/', '?', ':', '@', '=', '&') MUST be percent-encoded if they appear in a URL component where they are not being used for their reserved purpose; encoding a reserved character may change the semantics of a URL.
section: "2.2"
rfc2119_level: MUST
topics:
    - http
