document: rfc-4252
kind: normative-requirement
summary: A client MUST NOT send a subsequent authentication request if it has not received a response from the server for a previous request. A SSH_MSG_USERAUTH_FAILURE message MUST NOT be sent for an aborted method.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - security
