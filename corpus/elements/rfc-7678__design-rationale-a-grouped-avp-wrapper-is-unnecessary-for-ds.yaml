summary: A Grouped AVP wrapper is unnecessary for DS-Lite because AAA only needs to supply the AFTR's FQDN; the absence of lw4o6 or MAP-E Grouped AVPs with only the AFTR FQDN present implicitly signals DS-Lite as the selected transition method.
