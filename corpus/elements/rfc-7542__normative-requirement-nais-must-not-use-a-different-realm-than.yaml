document: rfc-7542
kind: normative-requirement
summary: NAIs MUST NOT use a different realm than the home realm unless the sender has explicit knowledge that the specified other realm is available and supports such usage. The use of the home realm MUST be the default unless otherwise configured.
section: "3.3"
rfc2119_level: MUST NOT
