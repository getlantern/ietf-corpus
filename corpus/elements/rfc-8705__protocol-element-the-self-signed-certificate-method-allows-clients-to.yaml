document: rfc-8705
kind: protocol-element
summary: The Self-Signed Certificate method allows clients to authenticate using self-signed certificates registered via the 'jwks' or 'jwks_uri' metadata parameters, with the certificate represented in the 'x5c' parameter of the JWK. The server does not validate the certificate chain, only that the presented certificate matches a registered one.
section: "2.2"
topics:
