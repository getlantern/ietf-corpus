document: rfc-8163
kind: design-rationale
summary: Unlike 6LoWPAN, 6LoBAC does not require fragmentation and reassembly below IPv6 because the latest MS/TP specification (BACnet Clause 9) supports large frame payloads (up to 2032-octet MSDUs), which comfortably accommodates the 1500-octet IPv6 MTU.
