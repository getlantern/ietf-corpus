document: rfc-9352
kind: protocol-element
summary: A new Anycast Flag (A-flag, bit 4) is defined in the Prefix Attribute Flags sub-TLV to indicate that a prefix or SRv6 Locator is configured as anycast. The A-flag MUST be preserved when the advertisement is leaked between levels, and the A-flag and N-flag MUST NOT both be set.
section: "6"
topics:
