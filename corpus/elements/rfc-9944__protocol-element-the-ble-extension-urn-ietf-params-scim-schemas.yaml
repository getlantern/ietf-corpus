document: rfc-9944
kind: protocol-element
summary: 'The BLE extension (urn:ietf:params:scim:schemas:extension:ble:2.0:Device) adds attributes for BLE device provisioning: deviceMacAddress (required, 48-bit public MAC), isRandom (boolean for random vs. public address), irk (Identity Resolving Key, write-only, never returned), versionSupport (required, multivalued), mobility (boolean for AP roaming), and pairingMethods (required, multivalued, references pairing method extension URIs).'
section: "7.1"
