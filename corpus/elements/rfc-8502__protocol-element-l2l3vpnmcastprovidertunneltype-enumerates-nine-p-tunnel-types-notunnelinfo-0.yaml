summary: 'L2L3VpnMcastProviderTunnelType enumerates nine P-tunnel types: noTunnelInfo(0), rsvpP2mp(1), ldpP2mp(2), pimSsm(3), pimAsm(4), pimBidir(5), ingressReplication(6), ldpMp2mp(7), and transportTunnel(8). These are aligned with IANA-registered Tunnel Types defined in RFC 6514 Section 5 and RFC 7524 Section 14.1.'
