summary: The <user-input> element content is the xs:string enumeration 'active' or 'idle'. It carries optional xs:positiveInteger attribute 'idle-threshold' (seconds) and optional xs:dateTime attribute 'last-input'. The <time-offset> element content is xs:integer (minutes from UTC).
