document: rfc-4992
kind: security-consideration
summary: Clients SHOULD be prepared to support SASL/DIGEST-MD5 and SASL/OTP for user authentication, and TLS with cipher suites TLS_RSA_WITH_3DES_EDE_CBC_SHA and TLS_RSA_WITH_AES_{128,256}_CBC_SHA (with and without client certificates) for encryption and mutual authentication. Anonymous access may be handled via no authentication or SASL/ANONYMOUS.
section: "14.1"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
