document: rfc-7598
kind: protocol-element
summary: OPTION_S46_DMR (code 91) conveys the Default Mapping Rule for MAP-T, containing a variable-length IPv6 prefix (dmr-ipv6-prefix) and its length (dmr-prefix6-len, 0–128). The field is right-padded to the nearest octet boundary.
