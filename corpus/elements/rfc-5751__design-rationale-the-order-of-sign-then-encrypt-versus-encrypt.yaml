document: rfc-5751
kind: design-rationale
summary: 'The order of sign-then-encrypt versus encrypt-then-sign has distinct security properties: encrypting first exposes signatories but allows signature verification without the private key; signing first obscures signatories via enveloping but allows a careful attacker to alter unauthenticated portions of the encrypted message.'
section: "3.6"
topics:
    - email
    - security
    - crypto
