document: rfc-7180
kind: normative-requirement
summary: An overloaded RBridge receiving a multi-destination TRILL Data frame MUST NOT apply the RPFC (Reverse-Path Forwarding Check), since due to overload it might not perform it correctly. It MUST NOT forward such frames except as egressed native frames where it is Appointed Forwarder.
section: 2.3.2
rfc2119_level: MUST NOT
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
