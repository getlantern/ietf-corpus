document: rfc-8322
kind: normative-requirement
summary: 'There MUST be exactly one atom:content element in a ROLIE Entry, restricted to the atomOutOfLineContent formulation: the type attribute MUST identify the serialization type (e.g., ''application/xml'') and the src attribute MUST be a dereferenceable URI for the content.'
section: 6.2.1
rfc2119_level: MUST
topics:
