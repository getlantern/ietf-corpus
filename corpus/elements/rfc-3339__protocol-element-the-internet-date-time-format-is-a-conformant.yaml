document: rfc-3339
kind: protocol-element
summary: The Internet Date/Time Format is a conformant subset of the ISO 8601 extended format. It represents a single instant in time in the range 0000AD–9999AD with a mandatory UTC offset, and excludes time periods, intervals, and unqualified local times.
section: "5.6"
