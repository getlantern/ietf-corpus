document: rfc-3782
kind: design-rationale
summary: The Impatient variant (reset retransmit timer only after the first partial ACK) is recommended over the Slow-but-Steady variant (reset after every partial ACK) because it gives faster recovery for large congestion windows with many drops, even though the Slow-but-Steady variant can avoid unnecessary retransmissions in some scenarios.
