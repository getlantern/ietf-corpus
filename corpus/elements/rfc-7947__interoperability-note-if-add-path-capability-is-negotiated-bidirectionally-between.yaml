document: rfc-7947
kind: interoperability-note
summary: If ADD-PATH capability is negotiated bidirectionally between a route server and a client, and the client propagates multiple paths for the same prefix to the route server, this can cause propagation of invalid or suboptimal paths; ADD-PATH should therefore be negotiated in send-only mode from the route server.
section: 2.3.2.2.2
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
