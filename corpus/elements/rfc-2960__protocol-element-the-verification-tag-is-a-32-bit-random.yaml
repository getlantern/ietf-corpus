document: rfc-2960
kind: protocol-element
summary: 'The Verification Tag is a 32-bit random value chosen at association startup; every SCTP packet MUST carry the peer''s Initiate Tag in the Verification Tag field. Packets with incorrect tags are silently discarded. Exception: INIT packets carry a zero Verification Tag.'
section: "3.1"
topics:
