document: rfc-2834
kind: protocol-element
summary: The HARP server maintains a table mapping IP addresses to HIPPI hardware addresses (switch address + ULA). When an InHARP_REQUEST arrives, the server performs one of five actions depending on whether the IP entry and HW entry already exist and are linked, including creating new entries, breaking old links, and adding new links.
section: "5.4"
topics:
