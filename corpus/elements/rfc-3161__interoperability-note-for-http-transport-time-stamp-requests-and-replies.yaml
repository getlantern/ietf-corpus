document: rfc-3161
kind: interoperability-note
summary: For HTTP transport, time-stamp requests and replies use MIME types application/timestamp-query and application/timestamp-reply respectively, carrying ASN.1 DER-encoded messages directly. The server MUST respond with content type application/timestamp-response or an HTTP error.
section: "3.4"
topics:
    - pkix
    - http
