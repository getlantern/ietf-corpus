document: rfc-1191
kind: normative-requirement
summary: A TCP implementation MUST NOT retransmit in response to every Datagram Too Big message; a burst of oversized segments produces multiple such messages and hence multiple retransmissions, leading to exponential growth in superfluous traffic if the new PMTU estimate is still wrong.
section: "6.4"
rfc2119_level: MUST NOT
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
