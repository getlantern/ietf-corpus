document: rfc-3810
kind: protocol-element
summary: The IPv6MulticastListen(socket, interface, IPv6 multicast address, filter mode, source list) service interface enables upper-layer protocols to request multicast reception with source filtering. EXCLUDE with empty source list is equivalent to MLDv1 Start Listening; INCLUDE with empty source list is equivalent to Stop Listening.
