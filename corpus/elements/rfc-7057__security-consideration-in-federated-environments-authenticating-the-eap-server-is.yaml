document: rfc-7057
kind: security-consideration
summary: 'In federated environments, authenticating the EAP server is insufficient: the peer must also validate that the contacted host is authorized to provide the requested service. A low-value compromised service could impersonate a high-value service, limiting overall system security to the weaker service.'
section: "2"
topics:
    - security
