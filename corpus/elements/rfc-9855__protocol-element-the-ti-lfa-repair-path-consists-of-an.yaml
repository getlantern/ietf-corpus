document: rfc-9855
kind: protocol-element
summary: The TI-LFA repair path consists of an outgoing interface and a Repair List (RL) of segments inserted on the SR header. The RL encodes an explicit, loop-free post-convergence path to the destination that avoids the protected resource X, guaranteed loop-free irrespective of FIB states along the explicit path.
