document: rfc-4447
kind: wire-format
summary: The PW Status TLV (type 0x096A) carries a 4-octet status code bit field, where each bit can be set individually to indicate one or more failures simultaneously. It is transported via the LDP Notification message with the Status TLV status code set to 0x00000028.
