document: rfc-7551
kind: wire-format
summary: The REVERSE_LSP Object uses Class_Num=203, C_Type=1. Its payload is zero or more variable-length subobjects in the same format as RSVP Objects (RFC 2205 Section 3.1.2). Any object that may appear in a Path message MAY be carried as a subobject, and subobject ordering MUST follow Path message object ordering requirements.
section: 4.4.1
topics:
    - mpls
    - routing
