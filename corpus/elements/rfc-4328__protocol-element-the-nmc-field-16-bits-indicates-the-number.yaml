document: rfc-4328
kind: protocol-element
summary: The NMC field (16 bits) indicates the number of ODU tributary slots used by an ODUj when multiplexed into an ODUk (k > j). For ODU2 into ODU3, NMC = 4; for all other currently defined multiplexing cases, NMC = 1.
