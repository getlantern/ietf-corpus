document: rfc-7060
kind: normative-requirement
summary: When U informs D that an MP-LSP is being carried in a multicast tunnel, U and D MUST take appropriate steps to ensure that packets U sends into the tunnel will be received by D; D must remain joined to the tunnel as long as U is its upstream LSR for any MP-LSP assigned to that tunnel.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
