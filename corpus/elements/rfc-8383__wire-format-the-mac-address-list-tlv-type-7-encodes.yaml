document: rfc-8383
kind: wire-format
summary: The MAC Address List TLV (Type 7) encodes a list of 48-bit MAC addresses; Length MUST be a multiple of 6. If not, the TLV is corrupt and the Address Flush message MUST be discarded if the receiving RBridge implements Type 7.
section: 2.2.7
topics:
    - routing
