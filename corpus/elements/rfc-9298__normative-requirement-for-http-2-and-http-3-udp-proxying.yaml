document: rfc-9298
kind: normative-requirement
summary: For HTTP/2 and HTTP/3, UDP proxying requests use HTTP Extended CONNECT with :method = CONNECT, :protocol = connect-udp, and non-empty :path and :scheme set to the URI Template expansion result. Non-conforming requests are malformed.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
    - quic
    - udp
