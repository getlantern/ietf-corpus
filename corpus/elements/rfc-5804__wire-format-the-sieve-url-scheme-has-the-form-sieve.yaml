document: rfc-5804
kind: wire-format
summary: The sieve URL scheme has the form `sieve://authority[/[owner/]scriptname]`. The scriptname and owner components are UTF-8 percent-encoded. An empty owner (`sieve://example.com//script`) is distinct from a missing owner (`sieve://example.com/script`) and is reserved for global scripts.
