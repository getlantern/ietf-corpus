document: rfc-1323
kind: normative-requirement
summary: Extension options (WSopt, TSopt) must be sent on non-SYN segments only when a prior SYN/SYN-ACK exchange has confirmed both sides understand the extension. WSopt or TSopt in a SYN,ACK must only be sent if the corresponding option was present in the initial SYN.
section: "1.3"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
