document: rfc-9339
kind: design-rationale
summary: The RM mechanism is not applicable for broadcast or NBMA links because the same objective is achieved there using the OSPF Two-Part Metric mechanism (RFC 8042) for OSPFv2. The OSPFv3 solution for those link types is out of scope.
