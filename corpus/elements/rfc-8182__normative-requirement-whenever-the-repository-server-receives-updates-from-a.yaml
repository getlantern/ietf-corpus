document: rfc-8182
kind: normative-requirement
summary: Whenever the Repository Server receives updates from a CA, it MUST generate new Snapshot and Delta Files within one minute. If combining updates from multiple CAs, publication MUST NOT be postponed longer than one minute for any involved CA.
section: 3.3.2
rfc2119_level: MUST
topics:
    - routing
