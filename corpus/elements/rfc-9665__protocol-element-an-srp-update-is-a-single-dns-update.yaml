document: rfc-9665
kind: protocol-element
summary: 'An SRP Update is a single DNS Update message (RFC 2136) containing three instruction types: Service Discovery Instructions (PTR RRs), Service Description Instructions (SRV, TXT, KEY RRs per service instance), and exactly one Host Description Instruction (A/AAAA and KEY RRs for the hostname). All three instruction types may be combined in one atomic transaction.'
section: 3.2.1
topics:
    - dns
    - zeroconf
