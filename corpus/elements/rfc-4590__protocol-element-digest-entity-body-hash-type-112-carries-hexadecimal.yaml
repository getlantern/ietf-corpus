kind: protocol-element
summary: 'Digest-Entity-Body-Hash (type 112): carries hexadecimal H(entity-body) required for qop=''auth-int'' digest calculation. RADIUS clients MUST use this attribute to transport the entity-body hash rather than sending the full body. Used only in Access-Request packets.'
