document: rfc-8979
kind: design-rationale
summary: The Subscriber Identifier Context Header was introduced to address the case where SFs located after a NAT function in mobile networks (e.g., past a 4G PGW or 5G UPF) cannot identify subscribers via internal IP addresses; passing an opaque subscriber ID in the NSH resolves this without requiring NAT traversal logic in SFs.
section: "1"
topics:
    - nat
    - mobility
    - privacy
