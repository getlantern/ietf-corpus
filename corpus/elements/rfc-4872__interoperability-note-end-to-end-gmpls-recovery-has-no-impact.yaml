document: rfc-4872
kind: interoperability-note
summary: End-to-end GMPLS recovery has no impact on RSVP-TE Fast Reroute (RFC 4090). Objects introduced by end-to-end recovery are ignored by RFC 4090-conformant implementations, and FRR can operate on a per-LSP basis as defined in RFC 4090. Both mechanisms may be used simultaneously on the same LSP.
section: "3"
topics:
    - mpls
    - routing
