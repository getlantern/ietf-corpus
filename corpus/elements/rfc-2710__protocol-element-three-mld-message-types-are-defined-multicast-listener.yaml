document: rfc-2710
kind: protocol-element
summary: 'Three MLD message types are defined: Multicast Listener Query (Type=130), Multicast Listener Report (Type=131), and Multicast Listener Done (Type=132). Queries have two subtypes—General Query (Multicast Address field = 0) and Multicast-Address-Specific Query (Multicast Address field = specific address).'
