document: rfc-5764
kind: interoperability-note
summary: RTP and RTCP MAY be multiplexed on a single UDP port (RFC 5761), halving the number of DTLS-SRTP sessions required and improving cryptographic performance. However, this may cause problems when RTP and RTCP are subject to different network treatment such as bandwidth reservation or QoS scheduling.
section: "3"
topics:
