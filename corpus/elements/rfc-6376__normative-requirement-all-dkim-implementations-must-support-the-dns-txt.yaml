document: rfc-6376
kind: normative-requirement
summary: All DKIM implementations MUST support the DNS TXT RR binding for key storage. The DKIM key is located at selector._domainkey.domain (e.g., 'foo.bar._domainkey.example.com').
section: 3.6.2
rfc2119_level: MUST
