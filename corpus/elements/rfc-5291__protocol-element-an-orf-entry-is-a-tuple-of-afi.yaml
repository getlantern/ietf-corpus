document: rfc-5291
kind: protocol-element
summary: An ORF entry is a tuple of <AFI/SAFI, ORF-Type, Action, Match, ORF-value>. An ORF consists of one or more entries sharing the same AFI/SAFI and ORF-Type, and is identified by <AFI/SAFI, ORF-Type>. The AFI/SAFI component limits the ORF to routes whose NLRI matches it.
section: "3"
topics:
