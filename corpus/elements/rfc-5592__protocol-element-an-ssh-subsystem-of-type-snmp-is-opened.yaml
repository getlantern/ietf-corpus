document: rfc-5592
kind: protocol-element
summary: An SSH Subsystem of type 'snmp' is opened by the SSH Transport Model. The client invokes the SSH connection protocol to open a 'session' channel type and then requests 'snmp' as the SSH Subsystem; failures at either step cause the transport connection to be closed and appropriate counters to be incremented.
section: "5.3"
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
