document: rfc-9336
kind: design-rationale
summary: Document Signing is defined narrowly as digitally signing contents consumed by people in printable or displayable form, explicitly distinguishing it from machine-processed content. This scoping prevents overreach of the KeyPurposeId to automated processing scenarios.
