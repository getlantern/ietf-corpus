summary: 'IANA created the ''RPL Routing Metric/Constraint'' top-level registry with sub-registries for: Routing Metric/Constraint Type (types 1–8: NSA, Node Energy, Hop Count, Throughput, Latency, LQL, ETX, Link Color), Routing Metric/Constraint TLVs, Common Header Flag Field (bits 5–8 assigned), Common Header A Field (values 0–3 assigned), NSA Object Flags, Hop-Count Object Flags, and Node Type Field. All allocations require IETF Review.'
