document: rfc-5098
kind: security-consideration
summary: Several writable MIB objects (ring cadence, caller ID protocol, DSCP values, CID mode, VMWI mode, pulse signal parameters) are sensitive to unauthorized modification. An adversary with write access could disrupt telephone signaling, alter caller ID delivery timing, or degrade QoS markings for voice traffic.
