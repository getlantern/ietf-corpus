document: rfc-8497
kind: privacy-consideration
summary: Logged SIP messages may contain personal identifiers such as SIP URIs, phone numbers, IP addresses, and communication patterns. Operators must apply appropriate data-protection measures to any stored logs and limit access to authorized personnel.
