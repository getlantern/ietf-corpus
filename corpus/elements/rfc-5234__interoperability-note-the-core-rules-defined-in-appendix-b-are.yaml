document: rfc-5234
kind: interoperability-note
summary: The core rules defined in Appendix B are only valid for ABNF encoded in 7-bit ASCII or character sets that are a superset of 7-bit ASCII. Specifications using other encodings must define their own core rules.
section: B.1
