document: rfc-5951
kind: normative-requirement
summary: The MPLS-TP NE MUST perform persistency checks on fault causes before declaring a failure. A data-plane forwarding path failure MUST be declared if the fault cause persists continuously for configurable Time-D, and MUST be cleared if absent continuously for configurable Time-C.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
