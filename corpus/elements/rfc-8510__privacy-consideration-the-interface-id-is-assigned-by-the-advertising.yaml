document: rfc-8510
kind: privacy-consideration
summary: The Interface ID is assigned by the advertising OSPF router as a locally unique identifier and need not be unique in any broader context. It is not expected to contain any information about the device owner or traffic transiting the device, so there are no privacy concerns associated with its advertisement.
section: "5"
topics:
    - privacy
    - routing
