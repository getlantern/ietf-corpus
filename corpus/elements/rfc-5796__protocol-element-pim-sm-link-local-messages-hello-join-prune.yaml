document: rfc-5796
kind: protocol-element
summary: PIM-SM link-local messages (Hello, Join/Prune, and Assert) use IP protocol number 103 with TTL=1, a link-local source address, and ALL_PIM_ROUTERS as the destination (224.0.0.13 for IPv4, ff02::d for IPv6). A forged link-local message sent to ALL_PIM_ROUTERS can disrupt distribution tree construction.
section: "1"
topics:
    - multicast
    - routing
    - ip
