document: rfc-5282
kind: normative-requirement
summary: A 16-octet ICV size SHOULD be used with IKEv2 as appropriate to IKEv2's key exchange functionality. Use of 12-octet ICVs (identifiers 15 and 19) is NOT RECOMMENDED; if an ICV larger than 8 octets is needed, 16-octet ICVs SHOULD be used.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
