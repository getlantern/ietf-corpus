document: rfc-5065
kind: wire-format
summary: 'AS_PATH segment type is a 1-octet field. This document adds type 3 (AS_CONFED_SEQUENCE) and type 4 (AS_CONFED_SET) to the existing types 1 (AS_SET) and 2 (AS_SEQUENCE) defined in BGP-4. Each segment is encoded as a triple: path segment type, path segment length, path segment value.'
