document: rfc-8049
kind: normative-requirement
summary: When NAT44 is required for cloud access, the 'enabled' leaf MUST be set to true in the 'nat44' container. By default, all sites in the IP VPN MUST be authorized to access a configured cloud; per-site restrictions are applied via 'permit-site' or 'deny-site' leaf-lists using 'deny-any-except' or 'permit-any-except' semantics.
section: 6.2.2
rfc2119_level: MUST
topics:
    - yang
    - vpn
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
