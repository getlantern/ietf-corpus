document: rfc-6059
kind: design-rationale
summary: 'Simple DNA uses a per-router probing model rather than a per-link model: instead of determining whether the host is on the same link, it probes each previously known router individually. This allows reuse of configuration from any router encountered across multiple prior attachments and optimizes movement between a known set of links.'
section: "1.3"
