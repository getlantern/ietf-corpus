document: rfc-8859
kind: protocol-element
summary: 'RFC 8859 defines nine normative multiplexing categories for SDP attributes: NORMAL (independently specified, unaffected), CAUTION (not advisable to multiplex), IDENTICAL (must repeat identical values), SUM (aggregate values for transport), TRANSPORT (use value from chosen m= line), INHERIT (inherits category from encapsulated attribute), IDENTICAL-PER-PT (must be identical per RTP payload type), SPECIAL (consult defining specification), and TBD (not yet analyzed, should not be multiplexed).'
section: "4"
topics:
