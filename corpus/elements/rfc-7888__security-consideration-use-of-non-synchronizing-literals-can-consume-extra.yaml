document: rfc-7888
kind: security-consideration
summary: Use of non-synchronizing literals can consume extra resources (e.g., memory) on IMAP servers and can be exploited for denial-of-service attacks. The LITERAL- extension partially mitigates this by capping non-synchronizing literal size at 4096 bytes.
section: "9"
topics:
