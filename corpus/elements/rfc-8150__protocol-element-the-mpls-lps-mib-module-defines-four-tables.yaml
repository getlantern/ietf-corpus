kind: protocol-element
summary: 'The MPLS-LPS-MIB module defines four tables: mplsLpsConfigTable (protection domain configuration), mplsLpsStatusTable (domain status, AUGMENTS ConfigTable), mplsLpsMeConfigTable (ME-to-domain associations), and mplsLpsMeStatusTable (ME protection status, AUGMENTS MeConfigTable). The module is rooted under mplsStdMIB at OID decimal 22.'
