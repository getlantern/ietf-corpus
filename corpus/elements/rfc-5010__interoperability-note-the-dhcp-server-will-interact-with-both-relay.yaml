document: rfc-5010
kind: interoperability-note
summary: The DHCP server will interact with both relay agents that support and those that do not support the relay-agent-flags suboption. Absence of the suboption indicates either a non-conforming relay or that the relay received a broadcast packet; presence with U=1 unambiguously signals a unicast relay.
section: "4"
extracted_by: claude-sonnet-4-6
