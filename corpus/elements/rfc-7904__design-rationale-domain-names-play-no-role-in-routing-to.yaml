document: rfc-7904
kind: design-rationale
summary: Domain names play no role in routing to a proxy in P2PSIP; once overlay connectivity is given, the technology allows any name registration, possibly constrained by overlay domain restrictions. This contrasts with regular SIP where domain names determine proxy routing.
