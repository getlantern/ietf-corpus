document: rfc-5239
kind: interoperability-note
summary: Floor control connection information is retrieved via SDP offer/answer exchange with the focus. The conference object ID maps to the BFCP 'confid' SDP attribute (RFC 4583), the conference user ID maps to 'userid', and each floor maps to a 'floorid' attribute containing 'm-stream' tags that reference SDP media sections via the 'Label' attribute (RFC 4574).
section: "8.4"
topics:
