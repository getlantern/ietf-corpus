document: rfc-7371
kind: interoperability-note
summary: Some implementations and specifications treat the 4 flag bits as a combined 4-bit integer rather than separate bits, leading to incorrect conclusions such as that ff3x::/32 is the only allowed SSM prefix block or that only ff70::/12 applies to Embedded-RP. This document's requirement to treat flag bits individually corrects these misinterpretations.
section: "3"
topics:
