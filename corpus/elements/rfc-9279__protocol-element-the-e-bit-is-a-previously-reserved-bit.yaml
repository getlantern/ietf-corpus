document: rfc-9279
kind: protocol-element
summary: The E-bit is a previously reserved bit in IGMPv3 and MLDv2 message headers that indicates the presence of the extension. It MUST be set to 1 when the extension is present, and MUST be 0 otherwise.
section: "3.1"
