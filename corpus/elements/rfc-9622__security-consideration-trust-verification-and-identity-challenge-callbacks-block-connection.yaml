document: rfc-9622
kind: security-consideration
summary: Trust verification and identity challenge callbacks block Connection establishment progress. Trust verification allows the application to verify a Remote Endpoint's X.509 certificate (RFC 5280) or other credential before the handshake continues. Applications SHOULD use common safe defaults for ciphersuite parameters.
section: 6.3.8
topics:
    - security
    - tls
    - pkix
