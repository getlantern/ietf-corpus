document: rfc-6265
kind: wire-format
summary: 'The Set-Cookie header is encoded as: `set-cookie-string = cookie-pair *( ";" SP cookie-av )` where `cookie-pair = cookie-name "=" cookie-value`, cookie-name is an RFC 2616 token, and cookie-value is a sequence of US-ASCII octets excluding CTLs, whitespace, DQUOTE, comma, semicolon, and backslash (or the same enclosed in DQUOTE).'
section: 4.1.1
topics:
    - http
