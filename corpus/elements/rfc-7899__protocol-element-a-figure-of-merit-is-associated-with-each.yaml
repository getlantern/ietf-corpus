document: rfc-7899
kind: protocol-element
summary: A *figure-of-merit* is associated with each (S,G) upstream state machine; it tracks recent activity via an exponential decay function and is initialized to zero at state creation. Damping becomes active when the figure-of-merit exceeds the *cutoff-threshold* and becomes inactive when it decays below the *reuse-threshold*.
section: "5.1"
topics:
    - multicast
    - routing
