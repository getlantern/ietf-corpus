document: rfc-7582
kind: normative-requirement
summary: In the Flat Partitioned Method, when a PE originates an I-PMSI or S-PMSI A-D route whose PTA specifies a bidirectional P-tunnel, the PE MUST be the root node of that P-tunnel.
