document: rfc-2596
kind: normative-requirement
summary: If a server does not support storing language codes and receives an Add request with an AttributeDescription containing a language code, it MUST treat that attribute as unrecognized. If the server forbids unrecognized attributes, it MUST fail the add request with the appropriate result code.
section: "3.6"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
