document: rfc-6344
kind: errata
summary: Section 5.2 states 'This field MUST be set to 2' for the Type field of the VCAT TLV, but the diagram in the same section shows 'Type = 4' and the IANA assignment in Section 7.1 also assigns value 4 to the VCAT TLV. The normative text value of 2 appears to contradict the diagram and IANA registry.
section: "5.2"
topics:
    - routing
    - mpls
    - registry
