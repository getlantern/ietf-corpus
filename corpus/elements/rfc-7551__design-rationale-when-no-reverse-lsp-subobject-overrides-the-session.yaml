document: rfc-7551
kind: design-rationale
summary: 'When no REVERSE_LSP subobject overrides the SESSION/SENDER_TEMPLATE, the egress node SHOULD swap the IP addresses: the reverse LSP''s SESSION Object gets the forward LSP''s SENDER_TEMPLATE address, and vice versa. This reflects the natural reversal of source and destination for a bidirectional pair.'
section: "5.2"
topics:
    - mpls
    - routing
