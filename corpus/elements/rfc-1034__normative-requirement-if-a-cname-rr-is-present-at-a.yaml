document: rfc-1034
kind: normative-requirement
summary: If a CNAME RR is present at a node, no other data should be present at that node. This ensures that data for a canonical name and its aliases cannot differ and that a cached CNAME can be used without consulting authoritative servers for other types.
section: 3.6.2
rfc2119_level: SHOULD
topics:
    - dns
