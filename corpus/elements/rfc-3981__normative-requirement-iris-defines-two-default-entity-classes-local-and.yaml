document: rfc-3981
kind: normative-requirement
summary: IRIS defines two default entity classes 'local' and 'iris' which MUST NOT be redefined and MUST be valid in all registry types. The 'iris' class MUST contain entity names 'id' (yielding <serviceIdentification>) and 'limits' (yielding <limits>).
section: 4.3.3
rfc2119_level: MUST
topics:
    - registry
