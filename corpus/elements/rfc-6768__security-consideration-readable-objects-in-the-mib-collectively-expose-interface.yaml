document: rfc-6768
kind: security-consideration
summary: Readable objects in the MIB collectively expose interface performance data and configuration aspects; GET and NOTIFY access should be controlled and object values SHOULD be encrypted when sent over the network via SNMP. SNMPv3 with USM/AES is required; Transport Security Model (TSM) with SSH or TLS/DTLS may also be used.
section: "7"
topics:
    - security
    - snmp
    - crypto
    - privacy
