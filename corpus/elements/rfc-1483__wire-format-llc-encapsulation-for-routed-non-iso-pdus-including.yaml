document: rfc-1483
kind: wire-format
summary: 'LLC Encapsulation for routed non-ISO PDUs (including IP): 3-octet LLC 0xAA-AA-03, followed by 3-octet OUI 0x00-00-00, followed by 2-octet EtherType. For IP the EtherType is 0x08-00. The PDU payload follows, up to 2^16-9 octets.'
section: "4.1"
topics:
