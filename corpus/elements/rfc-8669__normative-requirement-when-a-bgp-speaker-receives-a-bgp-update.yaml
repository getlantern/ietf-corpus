document: rfc-8669
kind: normative-requirement
summary: When a BGP speaker receives a BGP UPDATE containing a malformed BGP Prefix-SID attribute on an IPv4/IPv6 Labeled Unicast prefix, it MUST ignore the attribute and not advertise it to peers. This is equivalent to RFC 7606's 'Attribute discard' action.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
