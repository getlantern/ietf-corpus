document: rfc-8941
kind: normative-requirement
summary: Boolean true MUST omit its value when serialized as a Parameter value or Dictionary member value (i.e., the key appears without '=' and a value). Parsers are still required to correctly handle the explicit true value ('?1') when it appears.
section: 3.1.2
rfc2119_level: MUST
topics:
    - http
