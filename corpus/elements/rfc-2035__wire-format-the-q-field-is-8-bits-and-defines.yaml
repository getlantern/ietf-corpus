document: rfc-2035
kind: wire-format
summary: The Q field is 8 bits and defines the quantization tables for the frame. For Q 1–99 the IJG scaling formula is applied to JPEG standard Tables K.1 and K.2; Q >= 100 signals a dynamically defined table; Q = 0 is reserved.
