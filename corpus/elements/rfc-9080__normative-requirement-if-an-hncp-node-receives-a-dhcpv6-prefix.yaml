document: rfc-9080
kind: normative-requirement
summary: If an HNCP node receives a DHCPv6 prefix delegation for prefix P and publishes an External-Connection TLV containing a Delegated-Prefix TLV with prefix P and no Prefix-Policy TLV, it MUST announce a source-specific default route with source prefix P over Babel.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
