document: rfc-9922
kind: protocol-element
summary: The 'recurrence-utc-with-periods' grouping extends recurrence-utc with a 'period-timeticks' list (keyed by period-start of type yang:timeticks) to define an aggregate set of repeating occurrences. The recurrence set is the union of the recurrence rule and period-timeticks; duplicates are ignored.
section: 3.3.6
