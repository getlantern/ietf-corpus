document: rfc-8435
kind: protocol-element
summary: 'ffl_flags is a bitmap with four defined flags: FF_FLAGS_NO_LAYOUTCOMMIT (client need not send LAYOUTCOMMIT), FF_FLAGS_NO_IO_THRU_MDS (client should not proxy I/O through MDS), FF_FLAGS_NO_READ_IO (client should not send READs with RW iomode layouts), FF_FLAGS_WRITE_ONE_MIRROR (client need only update one mirror).'
section: "5.1"
