document: rfc-9264
kind: protocol-element
summary: The 'application/linkset' media type represents a set of links in a format nearly identical to the HTTP 'Link' header field value as specified in RFC 8288, extended to allow newline characters as separators for human readability. Non-ASCII characters are not permitted.
