document: rfc-4618
kind: normative-requirement
summary: If QoS information is carried, it SHOULD be represented in the EXP field of the PW label. If more than one MPLS label is imposed by the ingress LSR, the EXP field of all higher labels MUST also carry the same value.
section: "6.1"
rfc2119_level: MUST
topics:
