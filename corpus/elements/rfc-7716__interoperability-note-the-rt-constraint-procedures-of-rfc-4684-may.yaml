document: rfc-7716
kind: interoperability-note
summary: The RT Constraint procedures of RFC 4684 MAY be used to constrain distribution of MCAST-VPN routes carrying import RTs configured for GTM. If RT Constraint is deployed but MCAST-VPN routes carry no RTs, the 'default behavior' for the MCAST-VPN address family specified in draft-ietf-idr-rtc-no-rt is required for proper operation.
section: "2.2"
topics:
    - bgp
    - routing
    - multicast
