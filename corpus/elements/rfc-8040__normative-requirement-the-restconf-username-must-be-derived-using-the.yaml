document: rfc-8040
kind: normative-requirement
summary: The RESTCONF username MUST be derived using the algorithm defined in Section 7 of RFC 7589 when a client certificate is presented. For HTTP authentication, the RESTCONF username MUST be provided by the HTTP authentication scheme used. The username is subject to NACM (RFC 6536).
section: "2.5"
rfc2119_level: MUST
topics:
    - security
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
