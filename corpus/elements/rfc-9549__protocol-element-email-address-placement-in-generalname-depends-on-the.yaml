document: rfc-9549
kind: protocol-element
summary: 'Email address placement in GeneralName depends on the local-part: if the local-part is representable in ASCII (even when the host-part is an IDN), the address goes in rfc822Name (IA5String); if the local-part contains non-ASCII characters, the address goes in SmtpUTF8Mailbox within the otherName choice.'
section: "2.5"
topics:
