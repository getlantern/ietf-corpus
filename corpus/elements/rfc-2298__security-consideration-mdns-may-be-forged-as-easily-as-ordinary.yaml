document: rfc-2298
kind: security-consideration
summary: MDNs may be forged as easily as ordinary Internet email. Threats include falsified disposition notifications (reporting a disposition that never occurred) and unsolicited MDNs. Automated handlers should take precautions against denial-of-service via forged MDNs.
section: "6.1"
topics:
    - email
    - security
