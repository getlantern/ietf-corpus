document: rfc-3437
kind: normative-requirement
summary: The M bit for the LCP Want Options AVP MUST be set to 0 by default. If the sender does not wish to connect to a peer that does not understand this extension, it SHOULD set the M bit to 1.
section: "2.1"
rfc2119_level: MUST
topics:
