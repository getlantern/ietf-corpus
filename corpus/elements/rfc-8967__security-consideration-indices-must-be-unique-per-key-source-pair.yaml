document: rfc-8967
kind: security-consideration
summary: Indices must be unique per (key, source) pair and nonces unique per (key, source, destination) triple over the key's lifetime. 64-bit random values are considered sufficient; if uniqueness cannot be guaranteed (e.g., clock reset), rekeying is necessary.
