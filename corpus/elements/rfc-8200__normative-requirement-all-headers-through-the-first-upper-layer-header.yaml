document: rfc-8200
kind: normative-requirement
summary: All headers through the first upper-layer header must be included in the first fragment. If the first fragment does not include all headers through an Upper-Layer header, that fragment should be discarded and an ICMP Parameter Problem, Code 3, message should be sent.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
