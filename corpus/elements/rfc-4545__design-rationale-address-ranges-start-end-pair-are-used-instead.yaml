document: rfc-4545
kind: design-rationale
summary: Address ranges (start/end pair) are used instead of netmasks because ranges express the same constraints with greater flexibility. Applications that use netmasks may convert to/from ranges when reading or writing the MIB.
section: "7.5"
topics:
