document: rfc-7601
kind: wire-format
summary: 'The header field is formally specified in ABNF as: ''Authentication-Results:'' authserv-id [authres-version] (no-result / 1*resinfo). Each resinfo contains a semicolon-delimited methodspec (''method=result''), an optional reasonspec (''reason=value''), and zero or more propspec entries (''ptype.property=pvalue''). Method and result values are constrained to IANA-registered keywords.'
section: "2.2"
