document: rfc-7680
kind: interoperability-note
summary: 'Type-P-One-way-Packet-Loss is directly related to Type-P-One-way-Delay (RFC 7679): loss is 0 exactly when delay has a finite value, and 1 exactly when delay is undefined. Practical measurement systems therefore often combine methods for measuring both delay and loss using the same Tmax parameter.'
section: "2.5"
topics:
