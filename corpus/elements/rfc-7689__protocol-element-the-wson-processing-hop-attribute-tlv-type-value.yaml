summary: The WSON Processing Hop Attribute TLV (type value 4) is carried in ERO and RRO Hop Attributes subobjects and processed per RFC 7570 procedures. It carries one or more sub-TLVs targeting specific nodes along an LSP for optical signal processing configuration.
