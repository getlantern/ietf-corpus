document: rfc-7296
kind: normative-requirement
summary: The KEi payload MUST be included in the CREATE_CHILD_SA request when rekeying an IKE SA, providing mandatory forward secrecy. Additionally, all PRFs used with IKEv2 MUST accept variable-sized keys.
section: 1.3.2
rfc2119_level: MUST
