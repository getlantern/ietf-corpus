document: rfc-5121
kind: normative-requirement
summary: MLDv2 (RFC 3810) SHOULD be supported by hosts and routers attached via an 802.16 link. The AR SHOULD NOT send periodic MLD queries if the host is in idle/dormant mode, using paging controller state information to determine host status.
section: "10"
rfc2119_level: SHOULD
