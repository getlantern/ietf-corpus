document: rfc-2907
kind: normative-requirement
summary: If NEST_NO_DECISION_TIMER expires for state entry X/Y without any NIM received indicating X does not nest in Y, a MADCAP server MUST conclude that X nests inside Y and change X/Y from 'false' to 'true', then start the ZONES_EXIST_TIMER for X/Y. NEST_NO_DECISION_TIMER also resets X/Y='false' state to allow future true transitions if boundaries change.
section: "4.2"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
