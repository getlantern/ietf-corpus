document: rfc-9914
kind: protocol-element
summary: A Non-Storing Mode protection path is a loose source-routed end-to-end forward serial path installed by the Root using an NSM-VIO in a single P-DAO sent directly to the Track ingress node. Packets following the protection path are encapsulated with an SRH listing the intermediate hops. Each NSM-VIO for the same TrackID but a different SegmentID signals a distinct protection path.
section: 3.5.2
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
