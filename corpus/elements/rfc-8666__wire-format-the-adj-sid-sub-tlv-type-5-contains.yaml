document: rfc-8666
kind: wire-format
summary: The Adj-SID sub-TLV (Type 5) contains a Flags octet with B (Backup), V (Value/Index), L (Local/Global), G (Group), and P (Persistent) bits; a Weight octet; Reserved (16 bits); and a 3- or 4-octet SID/Label/Index field. Length is 7 or 8 octets.
