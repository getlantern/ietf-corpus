document: rfc-3490
kind: normative-requirement
summary: Implementations MUST NOT use more recent Unicode normalization tables than the one referenced from this document. If an application is unsure which version of the normalization tables is in the operating system, it must include the normalization tables itself.
section: "10"
rfc2119_level: MUST NOT
