summary: 'Two CDNI Logging fields are defined for URI Signing: ''s-uri-signing'' (mandatory, 3DIGIT format, characterizes the JWT verification result) and ''s-uri-signing-deny-reason'' (optional, QSTRING, provides further information on rejection). Both may appear zero or one time per log record.'
