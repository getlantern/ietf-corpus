document: rfc-4871
kind: normative-requirement
summary: Verifiers SHOULD evaluate multiple signatures independently and on their own merits. Verifiers SHOULD ignore failed signatures as though not present and continue checking until one successfully verifies. Verifiers MAY limit total signatures attempted to prevent denial-of-service.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - email
