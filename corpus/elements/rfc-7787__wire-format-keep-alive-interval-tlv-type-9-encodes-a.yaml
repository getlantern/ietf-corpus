document: rfc-7787
kind: wire-format
summary: Keep-Alive Interval TLV (type 9) encodes a 32-bit Endpoint Identifier (0 = all endpoints without a specific TLV) and a 32-bit Interval in milliseconds; a value of zero means no keep-alives are sent, requiring a lower-layer presence mechanism.
section: 7.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
