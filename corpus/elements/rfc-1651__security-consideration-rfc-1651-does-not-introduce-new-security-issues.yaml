document: rfc-1651
kind: security-consideration
summary: RFC 1651 does not introduce new security issues beyond those already present in RFC 821. The EHLO response announces server capabilities, but all such information could also be obtained by selectively probing individual SMTP verbs. Security implications of specific extensions are deferred to the RFCs defining those extensions.
section: "9"
topics:
