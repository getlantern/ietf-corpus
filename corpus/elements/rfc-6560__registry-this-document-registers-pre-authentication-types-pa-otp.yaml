document: rfc-6560
kind: registry
summary: This document registers pre-authentication types PA-OTP-CHALLENGE (141), PA-OTP-REQUEST (142), and PA-OTP-PIN-CHANGE (144) in the Kerberos pre-authentication type registry created by RFC 6113. PA-OTP-CONFIRM (143) is marked OBSOLETE. Error codes KDC_ERR_INVALID_HASH_ALG (94), KDC_ERR_INVALID_ITERATION_COUNT (95), KDC_ERR_PIN_EXPIRED (96), and KDC_ERR_PIN_REQUIRED (97) and key usage KEY_USAGE_OTP_REQUEST (45) are also defined.
section: "5"
