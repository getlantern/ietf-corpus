document: rfc-2082
kind: protocol-element
summary: The Key Identifier (Key-ID) is an unsigned 8-bit field that identifies the key used to create the Authentication Data. In implementations supporting multiple authentication algorithms, the Key-ID also implicitly identifies the algorithm in use. A key is associated with a specific interface.
section: "3.1"
topics:
