document: rfc-7523
kind: normative-requirement
summary: The JWT MUST contain an 'aud' (audience) claim that identifies the authorization server as an intended audience. The authorization server MUST reject any JWT that does not contain its own identity as the intended audience; audience values MUST be compared using Simple String Comparison per RFC 3986 Section 6.2.1.
section: "3"
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
