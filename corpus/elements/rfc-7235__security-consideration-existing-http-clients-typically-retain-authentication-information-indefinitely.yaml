document: rfc-7235
kind: security-consideration
summary: Existing HTTP clients typically retain authentication information indefinitely, and HTTP provides no mechanism for servers to direct clients to discard cached credentials. User agents that cache credentials are encouraged to provide a readily accessible mechanism for discarding them under user control.
section: "6.2"
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
