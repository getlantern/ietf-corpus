document: rfc-3459
kind: security-consideration
summary: Receiving systems and users MUST NOT place any authentication value on the Handling parameter, as it can be modified in transit. The parameter conveys the sender's intent about delivery criticality, not authenticated identity or authorization.
section: "15"
topics:
