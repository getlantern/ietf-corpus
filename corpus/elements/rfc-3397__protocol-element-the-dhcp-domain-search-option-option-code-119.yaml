document: rfc-3397
kind: protocol-element
summary: The DHCP Domain Search Option (option code 119) is passed from the DHCP Server to the DHCP Client to specify the domain search list used when resolving hostnames with DNS. It applies only to DNS and not to other name resolution mechanisms.
