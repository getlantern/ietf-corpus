document: rfc-9600
kind: normative-requirement
summary: An ECN-capable egress RBridge MUST set the ECN field of the outgoing native IP packet to the codepoint at the intersection of the inner IP ECN row and the arriving TRILL 3-bit ECN codepoint column in Table 3. If no flags word is present, the 3-bit codepoint is assumed to be all zeros.
section: 3.3.2
rfc2119_level: MUST
topics:
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
