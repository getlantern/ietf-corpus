document: rfc-9458
kind: registry
summary: 'This document registers two entries in the IANA ''HTTP Problem Types'' registry: ''https://iana.org/assignments/http-problem-types#date'' (Date Not Acceptable, HTTP 400) used to signal an unacceptable Date field in an Encapsulated Request, and ''https://iana.org/assignments/http-problem-types#ohttp-key'' (key configuration not acceptable, HTTP 400) for outdated or incorrect key configurations.'
section: "9.4"
