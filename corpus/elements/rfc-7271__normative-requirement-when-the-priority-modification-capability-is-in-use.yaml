document: rfc-7271
kind: normative-requirement
summary: 'When the priority modification capability is in use, the local request priority order from highest to lowest SHALL be: Clear Signal Fail, Signal Fail on Protection path, Forced Switch, Signal Fail on Working path. This inverts the RFC 6378 ordering of FS and SF-P.'
section: "4.4"
rfc2119_level: SHALL
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
