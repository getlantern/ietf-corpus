kind: wire-format
summary: 'Each entry in the Extended IS Reachability TLV (type 22) encodes: 7-octet system ID + pseudonode number, 3-octet default metric (24-bit unsigned integer), 1-octet sub-TLV length, followed by 0-244 octets of sub-TLVs. Each sub-TLV consists of 1-octet sub-type, 1-octet value length, and 0-242 octets of value.'
