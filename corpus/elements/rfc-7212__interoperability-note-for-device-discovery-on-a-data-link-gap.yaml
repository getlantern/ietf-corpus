document: rfc-7212
kind: interoperability-note
summary: For device discovery on a data link, GAP messages must be multicast since the sender does not initially know listener link-layer addresses. The correct destination Ethernet MAC for GAP packets carrying only the GAL (label value 13) is 01-00-5e-80-00-0d per RFC 5332.
section: "7"
topics:
    - mpls
    - multicast
