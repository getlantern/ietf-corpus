document: rfc-4171
kind: security-consideration
summary: The Login Control feature allows iSCSI targets to delegate access control policy to the iSNS server; only initiators sharing at least one common active DD with the target and matching iSNS-supplied authorization are permitted to establish sessions.
section: "7.4"
