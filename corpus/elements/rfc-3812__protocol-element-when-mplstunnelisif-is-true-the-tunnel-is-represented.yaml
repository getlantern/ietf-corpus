summary: When mplsTunnelIsIf is true, the tunnel is represented in ifTable with ifType mplsTunnel(150). The interface stack places the MPLS tunnel interface above the MPLS interface (ifType mpls(166)), which sits above the underlying layer (ATM, Frame Relay, Ethernet, etc.).
