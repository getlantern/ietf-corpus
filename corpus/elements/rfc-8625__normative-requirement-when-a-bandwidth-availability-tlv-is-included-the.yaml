document: rfc-8625
kind: normative-requirement
summary: When a Bandwidth Availability TLV is included, the Ethernet Bandwidth Profile TLV MUST also be included. If multiple bandwidth requirements have different availability requirements, multiple Bandwidth Availability TLVs MUST be carried with matching Index field values.
section: "3.1"
rfc2119_level: MUST
topics:
