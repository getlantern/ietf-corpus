document: rfc-5420
kind: security-consideration
summary: Adding attribute-recording information to the RRO Attributes subobject may reveal the status of the LSP and the capabilities of individual transit LSRs. There is an inherent tension between notifying the ingress LSR of per-hop status and concealing the existence or identity of transit LSRs.
section: "12"
topics:
    - security
    - mpls
    - routing
