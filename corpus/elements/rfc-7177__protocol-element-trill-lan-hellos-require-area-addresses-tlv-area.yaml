document: rfc-7177
kind: protocol-element
summary: 'TRILL LAN Hellos require: Area Addresses TLV (Area Address zero only), MT Port Capabilities TLV with VLAN-FLAGs sub-TLV, and zero or more TRILL Neighbor TLVs. TRILL P2P Hellos require a Three-Way Handshake TLV instead. BFD-Enabled TLV, Authentication TLV, and Protocols Supported TLV are optional in both types. Padding TLV SHOULD NOT be included. Any TLV permitted in a Layer 3 IS-IS Hello MAY also appear.'
section: "8.1"
topics:
    - routing
