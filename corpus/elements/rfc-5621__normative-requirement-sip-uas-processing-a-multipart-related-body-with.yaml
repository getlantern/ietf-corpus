document: rfc-5621
kind: normative-requirement
summary: SIP UAs processing a 'multipart/related' body with a given disposition type MUST process the disposition types of the body parts within it according to the SIP extension making use of the disposition type of the 'multipart/related'. This differs from the base MIME spec.
section: "7.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
