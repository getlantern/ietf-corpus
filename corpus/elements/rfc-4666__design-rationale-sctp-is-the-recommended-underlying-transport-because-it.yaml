document: rfc-4666
kind: design-rationale
summary: SCTP is the recommended underlying transport because it provides explicit packet-oriented delivery, sequenced multi-stream delivery, optional multiplexing, network-level fault tolerance through multi-homing, resistance to flooding and masquerade attacks, and path MTU-based data segmentation. These features collectively make SCTP superior to TCP for SS7 signalling transport over IP.
section: 1.3.1
topics:
    - sctp
    - security
