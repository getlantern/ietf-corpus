document: rfc-5090
kind: normative-requirement
summary: If Access-Challenge attributes (Digest-Qop, Digest-Algorithm, Digest-Domain, Digest-Opaque) are present in the nonce-carrying challenge, the RADIUS client MUST use them when constructing the (Proxy-)Authenticate header.
section: 2.1.5
rfc2119_level: MUST
