document: rfc-9438
kind: interoperability-note
summary: As a loss-based algorithm, CUBIC suffers in networks where packet loss is not a good indicator of bandwidth utilization, such as wireless or mobile networks. CUBIC can also fill large drop-tail buffers more quickly than Reno; proper queue sizing and AQM (RFC 7567) can mitigate this.
section: "5.4"
topics:
