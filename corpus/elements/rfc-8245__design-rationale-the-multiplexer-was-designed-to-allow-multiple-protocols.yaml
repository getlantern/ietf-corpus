document: rfc-8245
kind: design-rationale
summary: The multiplexer was designed to allow multiple protocols (e.g., NHDP and OLSRv2) to share the same IP protocol and UDP port, which became necessary when RFC 6130 was separated from RFC 7181 as distinct protocols while only a single MANET port allocation was made.
