document: rfc-9842
kind: normative-requirement
summary: Clients announcing support for 'dcz' MUST be able to decompress resources with a window size of at least 8 MB or 1.25 times the size of the dictionary, whichever is greater, up to a maximum of 128 MB. An implementation MAY treat a window size exceeding the limit as a decoding error.
section: "5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
