document: rfc-7606
kind: design-rationale
summary: Attribute discard should not be used when the attribute in question has or may have an effect on route selection or installation, unless careful analysis proves it is safe. The tradeoff between preserving connectivity and potential side effects must be analyzed, and such discard policies applied only to EBGP sessions to avoid correctness issues.
