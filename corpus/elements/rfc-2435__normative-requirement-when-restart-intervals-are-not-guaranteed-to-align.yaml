document: rfc-2435
kind: normative-requirement
summary: When restart intervals are not guaranteed to align with packet boundaries, the F and L bits MUST be set to 1 and Restart Count MUST be set to 0x3FFF, indicating the receiver MUST reassemble the entire frame before decoding.
section: 3.1.7
rfc2119_level: MUST
topics:
