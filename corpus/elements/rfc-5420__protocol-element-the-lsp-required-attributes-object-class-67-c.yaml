document: rfc-5420
kind: protocol-element
summary: The LSP_REQUIRED_ATTRIBUTES object (class 67, C-Type 1) uses a C-Num of the form 0bbbbbbb, causing LSRs that do not recognize it to reject the LSP setup with an 'Unknown Object Class' PathErr. Every transit LSR MUST examine its attributes and MUST NOT forward it without acting on its contents.
section: "5"
topics:
    - mpls
    - routing
