document: rfc-2622
kind: security-consideration
summary: RPSL's security relies on the mntner class for authentication and authorization of object updates. The mntner auth attribute supports NONE, MAIL-FROM, CRYPT-PW, and PGP-KEY schemes. Full details of the authentication and authorization model, including how maintainer hierarchies protect the IRR, are specified in the companion 'Routing Policy System Security' document.
