document: rfc-7035
kind: normative-requirement
summary: Location objects SHOULD NOT have all location information in the baseline location, as this would cause clients that do not understand relative location to incorrectly interpret the reference point as the actual precise location of the client.
section: "3"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
