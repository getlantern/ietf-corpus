document: rfc-7248
kind: design-rationale
summary: Rather than mapping both SIP and XMPP to abstract CPIM semantics (as done in RFC3922 and SIMPLE-CPIM-MAPPING), this document directly maps semantics between SIP/SIMPLE and XMPP, because the abstract-mapping approach has never been implemented in practice.
