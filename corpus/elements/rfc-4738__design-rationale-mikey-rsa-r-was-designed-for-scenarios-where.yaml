document: rfc-4738
kind: design-rationale
summary: MIKEY-RSA-R was designed for scenarios where the Initiator does not know the Responder's public key or even the Responder's ID in advance (e.g., call forwarding). Existing RSA, PSK, and DH modes are insufficient when the Initiator cannot obtain the Responder's certificate before the exchange.
section: "2.1"
topics:
    - realtime
    - crypto
    - security
