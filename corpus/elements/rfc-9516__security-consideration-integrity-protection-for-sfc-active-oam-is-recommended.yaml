document: rfc-9516
kind: security-consideration
summary: Integrity protection for SFC active OAM is RECOMMENDED using the MAC#1 Context Header from RFC 9145. Confidentiality can be achieved using IP ESP (RFC 4303). For IPv6 underlay networks, IP AH (RFC 4302) or ESP can also provide integrity protection.
section: "7"
topics:
