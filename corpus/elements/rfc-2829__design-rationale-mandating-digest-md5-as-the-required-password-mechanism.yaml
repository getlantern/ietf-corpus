document: rfc-2829
kind: design-rationale
summary: Mandating DIGEST-MD5 as the required password mechanism prevents the scenario where clients implement only cleartext passwords, which provide inadequate security. Without a mandated mechanism, interoperability in authentication cannot be achieved, as clients and servers may support disjoint security mechanisms.
section: "4"
topics:
    - ldap
    - security
