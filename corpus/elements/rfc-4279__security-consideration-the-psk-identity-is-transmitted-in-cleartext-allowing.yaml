document: rfc-4279
kind: security-consideration
summary: The PSK identity is transmitted in cleartext, allowing an eavesdropper to identify communicating parties. Reusing the same identity over time can enable traffic analysis even when the identity itself reveals no information. This is noted to be no worse than client certificates, which are also sent in cleartext.
section: "7.3"
topics:
    - tls
    - security
    - privacy
