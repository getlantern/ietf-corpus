document: rfc-7937
kind: protocol-element
summary: The s-cached field (1DIGIT) indicates cache hit ('1') or miss ('0'). '1' MUST only be used when the Surrogate served the request exclusively from its local cache; '0' covers partial-cache and full-miss scenarios without distinguishing dCDN-level cache state.
section: 3.4.1
topics:
    - http
