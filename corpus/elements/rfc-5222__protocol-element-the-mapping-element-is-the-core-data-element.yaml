document: rfc-5222
kind: protocol-element
summary: The <mapping> element is the core data element in LoST, describing a service region and associated service URLs. It carries mandatory attributes 'source', 'sourceId', 'lastUpdated', and 'expires', plus child elements for displayName, service, serviceBoundary or serviceBoundaryReference, one or more <uri> elements, and an optional <serviceNumber>.
