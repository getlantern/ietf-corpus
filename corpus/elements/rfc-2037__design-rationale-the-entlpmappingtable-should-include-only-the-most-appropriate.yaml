document: rfc-2037
kind: design-rationale
summary: The entLPMappingTable should include only the most appropriate physical component closest to the root of the containment tree. Redundant mappings derivable from entPhysicalContainedIn should be omitted; per-port mappings are appropriate only when multiple logical entities share the same module's ports.
