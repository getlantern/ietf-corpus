document: rfc-1341
kind: normative-requirement
summary: A subtype specification in the Content-Type field is MANDATORY; there are no default subtypes. New non-standard top-level Content-Types must use names starting with 'X-' to indicate non-standard status and avoid conflict with future official names.
section: "4"
rfc2119_level: REQUIRED
