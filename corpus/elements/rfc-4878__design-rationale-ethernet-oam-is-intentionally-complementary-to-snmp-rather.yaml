document: rfc-4878
kind: design-rationale
summary: 'Ethernet OAM is intentionally complementary to SNMP rather than a replacement: it operates at layer 2 and provides single-hop link-specific functions between directly connected Ethernet entities, whereas SNMP requires a layer 3 IP infrastructure. This allows OAM diagnostics to function even when higher-layer connectivity is impaired.'
section: "3"
