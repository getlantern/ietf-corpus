document: rfc-7512
kind: security-consideration
summary: 'There is no guarantee that the same PKCS #11 URI will always identify the same object, token, slot, or library in the future (RFC 3986 Section 7.1 applies). The PKCS #11 specification does not provide means to authenticate devices to users; local and physical security are required.'
