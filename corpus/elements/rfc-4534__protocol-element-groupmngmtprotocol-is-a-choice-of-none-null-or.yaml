document: rfc-4534
kind: protocol-element
summary: GroupMngmtProtocol is a CHOICE of none (NULL) or supported (Protocol), where Protocol is a SEQUENCE of an OBJECT IDENTIFIER and an OCTET STRING for protocol parameters. This abstraction allows any group management protocol to be plugged in.
