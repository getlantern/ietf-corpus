document: rfc-2068
kind: protocol-element
summary: Cache freshness is determined by computing the response's age (time since the origin server sent it) and comparing it against freshness lifetime derived from max-age, Expires, or heuristic estimation. A response is 'fresh' when age < freshness_lifetime; otherwise it is 'stale' and requires revalidation.
section: "13.2"
topics:
    - http
