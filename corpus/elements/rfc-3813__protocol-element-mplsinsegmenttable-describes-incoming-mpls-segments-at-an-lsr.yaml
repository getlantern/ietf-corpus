document: rfc-3813
kind: protocol-element
summary: mplsInSegmentTable describes incoming MPLS segments at an LSR. Each entry is indexed by MplsIndexType and carries the incoming interface, label (or a RowPointer to an extension table for oversized labels), the number of labels to pop (mplsInSegmentNPop), address family, and a pointer back to the cross-connect entry via mplsInSegmentXCIndex.
section: "5.3"
topics:
