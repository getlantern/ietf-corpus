document: rfc-9277
kind: design-rationale
summary: The TN(ct) formula for CoAP Content-Format tags deliberately avoids zero bytes in the 4-byte tag number representation, preventing issues with C-string-based magic number matching. No tags are defined for Content-Format numbers 65025–65535 (the experimental range).
section: B
