document: rfc-4320
kind: design-rationale
summary: Sending any provisional response inside a non-INVITE transaction (NIT) before Timer E reaches T2 damages recovery from failure of an unreliable transport, which is why the 100 Trying is withheld until Timer E reaches T2 for UDP hops.
section: "2.1"
topics:
