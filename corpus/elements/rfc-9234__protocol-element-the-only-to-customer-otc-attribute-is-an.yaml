document: rfc-9234
kind: protocol-element
summary: The Only to Customer (OTC) Attribute is an optional transitive BGP Path Attribute with Type Code 35 and a fixed length of 4 octets. Its value is an AS number indicating the AS at which the route was last propagated laterally or upward, enforcing downstream-only propagation thereafter.
