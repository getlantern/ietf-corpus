document: rfc-7846
kind: security-consideration
summary: Residual attacks include Sybil attacks (a single entity controlling many peer IDs to gain disproportionate influence), eclipse attacks (isolating a peer by controlling all entries in its peer list), and tracker impersonation. Mitigation relies on secure authentication and enrollment. Tracker responses to abnormal conditions proceed to TERMINATE state for that peer ID.
section: "6.3"
topics:
    - security
