document: rfc-9255
kind: design-rationale
summary: Given external (non-RPKI) verification of authority, the use of RPKI-based credentials adds no authenticity. External identity verification and RPKI authorization are orthogonal; combining them does not produce stronger identity guarantees.
section: "2"
topics:
