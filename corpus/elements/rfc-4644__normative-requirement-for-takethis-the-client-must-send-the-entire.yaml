document: rfc-4644
kind: normative-requirement
summary: For TAKETHIS, the client MUST send the entire article (headers and body) as a multi-line data block. The server MUST return either 239 (success) or 439 (rejected); on temporary error it MUST reply 400 and close the connection.
section: 2.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
