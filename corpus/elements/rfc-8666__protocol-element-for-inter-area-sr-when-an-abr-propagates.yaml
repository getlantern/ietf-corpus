document: rfc-8666
kind: protocol-element
summary: For inter-area SR, when an ABR propagates a Prefix-SID to connected areas it uses the Prefix-SID from the router on the best path to the prefix in the source area; if none is found on the best-path router, it falls back to any other router advertising a Prefix-SID for that prefix.
section: "8.2"
topics:
    - mpls
    - routing
