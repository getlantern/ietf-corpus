document: rfc-2875
kind: protocol-element
summary: 'The Discrete Logarithm signature produces a pair (r, s): r = (g^k mod p) mod q; s = (k^-1 * (m + x*r)) mod q, where k is a fresh random integer and m is the (possibly expanded) message digest. Both r and s must be non-zero; otherwise k is regenerated.'
section: "4.2"
topics:
