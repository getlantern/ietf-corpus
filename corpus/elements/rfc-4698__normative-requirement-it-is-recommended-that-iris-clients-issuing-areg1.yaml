document: rfc-4698
kind: normative-requirement
summary: It is RECOMMENDED that IRIS clients issuing AREG1 requests use the 'top' resolution method when no resolution method has been explicitly given by a user. IRIS servers that are not authoritative for requested information SHOULD refer clients using the 'top' resolution method.
section: "7.3"
rfc2119_level: RECOMMENDED
