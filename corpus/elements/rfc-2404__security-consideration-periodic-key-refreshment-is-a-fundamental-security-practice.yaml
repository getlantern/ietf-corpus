document: rfc-2404
kind: security-consideration
summary: Periodic key refreshment is a fundamental security practice recommended for HMAC-SHA-1-96 to guard against potential weaknesses, reduce information available to cryptanalysts, and limit damage from exposed keys, even though current attacks do not indicate a specific rekeying frequency.
