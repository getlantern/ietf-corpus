document: rfc-5891
kind: design-rationale
summary: IDNA2008 is Unicode-version agnostic, unlike IDNA2003 which was pegged to Unicode 3.2. Character validity is determined by Unicode properties plus a small human-curated exclusion list rather than a fixed table, allowing the protocol to evolve with Unicode.
section: A
