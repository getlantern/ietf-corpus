document: rfc-6285
kind: normative-requirement
summary: The BRS MUST NOT send preamble information in a particular format unless the RTP_Rx has explicitly signaled support for that format via a public or private extension in the RAMS-R message. Absent the Preamble-only Allowed TLV (Type=5), the BRS MUST NOT respond to a RAMS-R with preamble-only content.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
