document: rfc-8149
kind: wire-format
summary: The S2L_SUB_LSP_FRAG object (Class Number 204, C-Type 1) is 8 bytes long. It contains a 16-bit Fragment ID (1-65535), an 8-bit Fragments Total (1-255), and an 8-bit Fragment Number (1-255), enabling unambiguous reconstruction of fragmented S2L sub-LSP descriptor lists.
section: "5.3"
