document: rfc-2749
kind: interoperability-note
summary: The COPS-RSVP specification requires that the PDP implement the same RSVP functional specification as the PEP, enabling the PDP and PEP to share RSVP state and for the PDP to interpret ClientSI object content and determine associations (including multicast blockade state transitions) from REQ message contents.
section: "2.3"
topics:
