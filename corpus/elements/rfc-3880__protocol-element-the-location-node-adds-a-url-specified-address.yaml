document: rfc-3880
kind: protocol-element
summary: The 'location' node adds a URL-specified address to the current location set. Parameters include 'url' (required), 'priority' (0.0–1.0, default 1.0), and 'clear' (whether to empty the set before adding). Multiple locations are added by cascading nodes.
