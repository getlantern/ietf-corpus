document: rfc-3456
kind: normative-requirement
summary: Since DHCP Relays are stateless, the security gateway SHOULD insert appropriate information in the DHCP message prior to forwarding to DHCP servers so it can route DHCPOFFER responses back to the correct IPsec tunnel without maintaining per-discovery state.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ipsec
    - vpn
