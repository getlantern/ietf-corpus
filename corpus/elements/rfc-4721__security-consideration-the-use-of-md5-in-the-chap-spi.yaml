document: rfc-4721
kind: security-consideration
summary: The use of MD5 in the CHAP_SPI/RADIUS-compatible authenticator computation (Section 8) is less secure than HMAC-MD5 and MUST be avoided whenever possible. HMAC-MD5 is the preferred algorithm for the Mobile-AAA Authentication extension.
section: "12"
topics:
    - security
    - crypto
    - mobility
