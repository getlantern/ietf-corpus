document: rfc-5837
kind: protocol-element
summary: 'The extension defines four interface roles encoded in C-Type bits 0-1: value 0 (incoming IP interface), value 1 (sub-IP component of the incoming IP interface, e.g., a LAG member or multilink bundle member), value 2 (outgoing IP interface), and value 3 (IP next hop).'
