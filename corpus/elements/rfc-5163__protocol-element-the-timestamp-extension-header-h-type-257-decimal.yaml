document: rfc-5163
kind: protocol-element
summary: The TimeStamp Extension Header (H-Type 257 decimal, HLEN=3) is an Optional Extension Header that adds a 32-bit microsecond-resolution timestamp to an SNDU, representing the number of 1-microsecond ticks past the hour in Universal Time when the PDU was encapsulated.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
