document: rfc-8520
kind: normative-requirement
summary: The cache-validity field MUST NOT be more than 168 hours for any supported Thing; it is RECOMMENDED to be no less than 24 hours, and SHOULD be no shorter than any HTTP caching directive period.
section: "3.5"
rfc2119_level: MUST NOT
