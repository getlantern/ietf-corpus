document: rfc-2616
kind: security-consideration
summary: Authentication credentials sent over persistent connections or stored in caches risk exposure to unauthorized parties. Shared caches MUST NOT return responses with Authorization headers unless explicitly permitted by Cache-Control (must-revalidate, public, or s-maxage).
section: "15.6"
topics:
    - http
    - security
