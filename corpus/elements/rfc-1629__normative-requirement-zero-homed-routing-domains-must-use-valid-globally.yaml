document: rfc-1629
kind: normative-requirement
summary: Zero-homed routing domains must use valid globally unique NSAP addresses. A routing domain connected via private link to a participant in the global OSI addressing plan (ISO 8348) must be able to distinguish the zero-homed domain's NSAPs from all others, which can only be guaranteed with globally unique addresses.
section: "5.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
