document: rfc-6098
kind: registry
summary: 'IANA added a new column to the Mobile IPv4 extensions registry indicating whether each extension is permitted for use with the Generic Notification Message. Currently four extensions are permitted: MN-HA AE, MN-FA AE, FA-HA AE, and the Message String Extension (RFC 4917).'
