document: rfc-1757
kind: protocol-element
summary: The host group discovers hosts by tracking source and destination MAC addresses seen in good packets received promiscuously; it consists of hostControlTable, hostTable, and hostTimeTable. The hostTopN group extends this with rate-based top-N reporting over a configurable interval.
