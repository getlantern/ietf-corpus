document: rfc-4469
kind: normative-requirement
summary: No further LOGIN or AUTHENTICATE command is performed for URLs specified in the extended APPEND command, since the APPEND command is valid in the authenticated state and the URLs refer to the current session.
section: "3"
rfc2119_level: MUST NOT
