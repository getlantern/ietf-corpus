document: rfc-5761
kind: normative-requirement
summary: For Any Source Multicast (ASM) RTP sessions, RTP and RTCP packets SHOULD NOT be multiplexed onto a single port; they SHOULD instead use separate ports and multicast groups to preserve third-party monitoring capability.
section: "5.2"
rfc2119_level: SHOULD NOT
topics:
