document: rfc-2163
kind: normative-requirement
summary: Local mappings (not intended for global use) MUST NOT be included in DNS PX records. If local mappings are used, they must be stored using static local tables, analogously to local static host tables.
section: "3"
rfc2119_level: MUST NOT
topics:
