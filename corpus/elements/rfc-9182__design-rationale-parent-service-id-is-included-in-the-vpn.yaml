document: rfc-9182
kind: design-rationale
summary: '''parent-service-id'' is included in the VPN service data structure specifically to correlate the network-layer L3VPN with its triggering service order (e.g., an L3SM instance, a network slice, or a VPN+), enabling a controller to populate description fields and trace network instantiation back to a customer request.'
section: "7.3"
