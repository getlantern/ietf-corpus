document: rfc-3484
kind: design-rationale
summary: The specification assumes routing (outgoing interface selection) is done before source address selection. This separation allows implementations to use source address considerations only as a tiebreaker among otherwise equivalent routes, keeping routing and address selection loosely coupled.
section: "7"
