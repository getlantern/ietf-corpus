document: rfc-3329
kind: normative-requirement
summary: A client wishing to use the security agreement MUST add a Security-Client header field to a request addressed to its first-hop proxy containing all supported security mechanisms, and MUST add both Require and Proxy-Require header fields with the value 'sec-agree'.
section: 2.3.1
rfc2119_level: MUST
topics:
    - sip
    - security
