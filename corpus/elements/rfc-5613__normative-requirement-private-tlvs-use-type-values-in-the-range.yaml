document: rfc-5613
kind: normative-requirement
summary: Private TLVs use type values in the range 32768–65535. The first four octets of the Value field MUST be the private enterprise code (per IANA), allowing multiple vendor private extensions to coexist on the same network.
section: "2.6"
rfc2119_level: MUST
topics:
    - routing
    - registry
