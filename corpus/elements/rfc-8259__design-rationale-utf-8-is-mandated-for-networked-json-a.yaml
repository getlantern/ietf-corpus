document: rfc-8259
kind: design-rationale
summary: UTF-8 is mandated for networked JSON (a change from RFC 7159) not because other encodings are technically invalid, but because the vast majority of JSON implementations already use UTF-8 and it is the only encoding that achieves practical interoperability.
section: "8.1"
