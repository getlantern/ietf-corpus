document: rfc-9161
kind: protocol-element
summary: The Unicast-Forward sub-function allows a PE to forward ARP Requests or NS messages directly to the MAC owner (unicast) rather than flooding or replying. It can be configured as 'unicast-forward always' or 'unicast-forward unknown-options', the latter forwarding only when ARP/ND packets carry unrecognized options.
section: "3.4"
topics:
