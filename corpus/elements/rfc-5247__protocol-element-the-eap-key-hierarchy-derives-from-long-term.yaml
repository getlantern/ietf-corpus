document: rfc-5247
kind: protocol-element
summary: The EAP key hierarchy derives from long-term credentials through TEKs (used internally by the method, not exported), MSK (≥64 octets, exported), EMSK (≥64 octets, exported, never shared), and optional IV (deprecated). Lower layers derive Transient Session Keys (TSKs) from the MSK. Peer-Id(s), Server-Id(s), Session-Id, and channel binding parameters are also exported by the method.
section: "1.4"
topics:
    - security
    - crypto
