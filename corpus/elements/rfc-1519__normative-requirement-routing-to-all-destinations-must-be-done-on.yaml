document: rfc-1519
kind: normative-requirement
summary: Routing to all destinations MUST be done on a longest-match basis only. Multi-homed destinations cannot be summarized and must always be explicitly announced into every routing domain through which they are reachable.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - routing
