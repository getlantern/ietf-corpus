document: rfc-8556
kind: interoperability-note
summary: If a BFER's Leaf A-D route PTA specifies a sub-domain different from the one being used for transmitting the packet, the bit for that BFER cannot be determined and that BFER will not receive the packet. Sub-domain consistency between ingress PTA and Leaf A-D route is required for correct delivery.
section: "4.1"
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
