document: rfc-8599
kind: normative-requirement
summary: When a UA receives a push notification, it MUST send a binding-refresh REGISTER request and MUST insert the same set of 'pn-*' SIP URI parameters that it inserted when it originally requested push notifications. If the PNS updated the PRID, the UA inserts the new value.
section: 4.1.3
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
