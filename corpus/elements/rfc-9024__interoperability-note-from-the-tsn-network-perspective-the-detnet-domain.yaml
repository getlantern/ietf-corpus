document: rfc-9024
kind: interoperability-note
summary: From the TSN network perspective, the DetNet domain is a single hop (single TSN relay node), so some parameters such as delay may differ significantly between the DetNet segment and native TSN segments. The bandwidth of the DetNet network must be set large enough to handle all TSN flows it supports.
