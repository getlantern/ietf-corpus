document: rfc-3537
kind: protocol-element
summary: HMAC key guidelines recommend the key be at least as long as the hash output L. Keys longer than the hash block size are hashed before use; keys much longer than L provide no security benefit unless the key generation PRNG has low entropy.
section: "2"
topics:
