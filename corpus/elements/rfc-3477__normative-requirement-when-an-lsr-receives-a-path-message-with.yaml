document: rfc-3477
kind: normative-requirement
summary: When an LSR receives a Path message with an IF_ID RSVP_HOP IF_INDEX TLV that does not match any known <Router ID, local identifier> tuple, the LSR SHOULD return an error using the IF_ID ERROR_SPEC object with Error code 24 and Error value 16.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
