document: rfc-3895
kind: protocol-element
summary: dsx1ChanMappingTable maps DS1 or DS2 channel numbers within a parent DS3/E3 or DS2/E2 to their ifIndex values. Enables navigation of hierarchical channelization (DS3->DS2->DS1->DS0) using a common lookup mechanism.
