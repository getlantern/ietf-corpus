document: rfc-1748
kind: interoperability-note
summary: 'For functional addresses in the ifRcvAddressTable, only one entry is required per 802.5 interface: the entry for the address whose functional address bit is ANDed with the bitmask of all accepted functional addresses. Address format in ifRcvAddressAddress matches ifPhysAddress canonical order.'
