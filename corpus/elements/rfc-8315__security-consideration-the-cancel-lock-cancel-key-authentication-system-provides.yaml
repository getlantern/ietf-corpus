document: rfc-8315
kind: security-consideration
summary: The Cancel-Lock/Cancel-Key authentication system provides no integrity checking. Arbitrary modifications can be applied to an article in transit regardless of Cancel-Key presence; a matching Cancel-Key only confirms that the cancellation was approved by a legitimate agent, not that the article is unmodified.
section: "7"
topics:
    - security
