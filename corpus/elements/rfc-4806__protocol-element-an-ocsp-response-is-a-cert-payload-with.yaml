document: rfc-4806
kind: protocol-element
summary: An OCSP response is a CERT payload with Cert Encoding value 14 ('OCSP Content'). Its Certificate Data field contains a DER-encoded OCSPResponse structure as defined in RFC 2560. Correlation to the certificate being validated is achieved by matching the OCSP response CertID field to the certificate.
section: "3.2"
topics:
    - ipsec
    - pkix
    - security
