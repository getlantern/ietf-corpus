document: rfc-7256
kind: normative-requirement
summary: When the Port Management message is used for multicast, the Function field MUST be set to 8 ('Configure Connection Service Data') and the message MUST include TLVs identifying the access line; for DSL loops, line-identifying TLVs MUST follow RFC 6320 Section 5.1.2.
section: "4.2"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
