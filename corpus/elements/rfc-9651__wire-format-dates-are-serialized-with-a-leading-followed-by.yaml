document: rfc-9651
kind: wire-format
summary: Dates are serialized with a leading '@' followed by an integer representing a (possibly negative) delta in seconds from 1970-01-01T00:00:00Z excluding leap seconds, identical in encoding to Integers. Parsers MUST support all days in years 1–9999 (-62,135,596,800 to 253,402,214,400 delta seconds).
section: 3.3.7
topics:
    - http
