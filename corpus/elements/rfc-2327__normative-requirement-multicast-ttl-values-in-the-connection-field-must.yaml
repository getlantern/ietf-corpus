document: rfc-2327
kind: normative-requirement
summary: Multicast TTL values in the connection field must be in the range 0-255. Multiple 'c=' lines or the slash notation for multiple addresses can only be specified on a per-media basis, not for a session-level 'c=' field. It is illegal to specify both multiple addresses in 'c=' and multiple ports in 'm=' within the same media description.
section: "6"
rfc2119_level: MUST
topics:
    - realtime
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
