document: rfc-9195
kind: security-consideration
summary: The content-data part may contain sensitive data whose security sensitivity depends entirely on the content-schema. Instance data files MAY need to be handled securely; the same protections applied to a live read operation returning equivalent data should apply to the file at rest and in transit.
