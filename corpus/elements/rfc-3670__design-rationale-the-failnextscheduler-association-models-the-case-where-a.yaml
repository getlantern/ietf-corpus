document: rfc-3670
kind: design-rationale
summary: The FailNextScheduler association models the case where a non-work-conserving scheduler declines a scheduling opportunity, passing control to a fallback scheduler (e.g., WRR) only for queues that were passed over. This is semantically equivalent to a meter's out-of-profile behavior applied to scheduling.
section: 3.11.3
topics:
