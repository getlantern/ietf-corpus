document: rfc-4806
kind: protocol-element
summary: A new Cert Encoding value of 14 ('OCSP Content') is defined for use in both CERTREQ and CERT payloads in IKEv2. When used in a CERTREQ, it signals an OCSP request; when used in a CERT, it carries an OCSP response.
