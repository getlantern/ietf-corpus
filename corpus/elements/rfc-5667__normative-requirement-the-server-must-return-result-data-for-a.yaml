document: rfc-5667
kind: normative-requirement
summary: The server MUST return result data for a posted buffer by progressively filling its segments, leaving trailing segments unfilled or partially full if the result is smaller than the total buffer. Results returned by direct placement MUST NOT be returned by other methods such as Read chunk list or inline.
section: "3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
