document: rfc-8655
kind: design-rationale
summary: DetNet focuses exclusively on worst-case values for end-to-end latency, jitter, and packet misordering rather than average or typical values. Average latency values are of little interest because they do not affect the ability of a real-time system to perform its tasks; a trivial priority-based scheme will give better average latency but unacceptable worst-case latency.
section: "3.1"
topics:
    - routing
    - qos
    - realtime
