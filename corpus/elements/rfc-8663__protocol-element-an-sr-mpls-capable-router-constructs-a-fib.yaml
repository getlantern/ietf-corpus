document: rfc-8663
kind: protocol-element
summary: An SR-MPLS-capable router constructs a FIB entry for a Prefix-SID by either popping the top label (PHP case, when NP-Flag in OSPF or P-Flag in IS-IS is clear) or swapping the top label to SID(E) plus the lower bound of E's SRGB (no-PHP case, when the flag is set).
section: "3.1"
topics:
    - mpls
    - routing
