document: rfc-4650
kind: design-rationale
summary: DHHMAC targets the gap between MIKEY-PS (simple but no PFS, no mutual key contribution) and MIKEY-DHSIGN (PFS but requires PKI). It is a 'synergetic optimization' delivering PFS and mutual key contribution with only pre-shared key infrastructure, at the cost of not providing non-repudiation or identity protection.
