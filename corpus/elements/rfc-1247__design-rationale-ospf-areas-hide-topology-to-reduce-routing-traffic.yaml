document: rfc-1247
kind: design-rationale
summary: OSPF areas hide topology to reduce routing traffic and protect intra-area routing from bad external data. Intra-area routing uses only the area's own topology; inter-area routing forces a star (hub-and-spoke) topology through the backbone.
section: "3"
topics:
