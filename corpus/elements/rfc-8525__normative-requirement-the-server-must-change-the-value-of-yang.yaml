document: rfc-8525
kind: normative-requirement
summary: The server MUST change the value of '/yang-library/content-id' whenever the information represented by the '/yang-library' tree (except the content-id leaf itself) has changed. There is no requirement that the same information always result in the same content-id value.
section: "3"
rfc2119_level: MUST
topics:
    - yang
    - netconf
