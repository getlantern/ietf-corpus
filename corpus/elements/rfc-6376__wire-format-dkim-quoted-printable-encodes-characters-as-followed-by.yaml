document: rfc-6376
kind: wire-format
summary: DKIM-Quoted-Printable encodes characters as '=' followed by two uppercase hexadecimal digits. All control characters, 8-bit characters, DEL, SPACE, and semicolon MUST be encoded. FWS may be added at arbitrary locations and MUST be removed before decoding.
section: "2.11"
