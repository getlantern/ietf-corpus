document: rfc-3630
kind: protocol-element
summary: 'The Link ID sub-TLV (type 2, 4 octets) identifies the far end of the link: the neighbor''s Router ID for point-to-point links, or the interface address of the designated router for multi-access links. The value is identical to the Link ID field in the Router LSA.'
section: 2.5.2
topics:
    - routing
