document: rfc-3767
kind: normative-requirement
summary: If any change is made to stored credentials, the server MUST update the corresponding LastModified value to the current time at the server. The LastModified value in an UploadRequest MUST be the value most recently received in a corresponding DownloadResponse for that credential.
section: 2.2.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
