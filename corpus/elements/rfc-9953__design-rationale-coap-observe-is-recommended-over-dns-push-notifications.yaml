document: rfc-9953
kind: design-rationale
summary: CoAP Observe is RECOMMENDED over DNS Push Notifications for the DoC domain because DNS Push introduces additional overhead incompatible with constrained resources, whereas CoAP Observe reuses existing CoAP machinery and is particularly beneficial for frequently requested short-lived records.
