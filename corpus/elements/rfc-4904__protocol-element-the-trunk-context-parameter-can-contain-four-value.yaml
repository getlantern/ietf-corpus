kind: protocol-element
summary: 'The ''trunk-context'' parameter can contain four value types: (1) a specific host/gateway, (2) a subdomain identifying a subset of gateways, (3) a service provider domain identifying all gateways in that domain, or (4) a global number or leading digits for provider-wide scoping.'
