document: rfc-9168
kind: normative-requirement
summary: During PCEP session establishment, a PCC or PCE that supports Flow Specifications MUST include the PCE-FLOWSPEC-CAPABILITY TLV in the OPEN object. If either peer omits this TLV, the other peer MUST NOT include a FLOWSPEC object in any subsequent PCEP message to that peer.
section: 3.2.1.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
