document: rfc-7678
kind: security-consideration
summary: MITM attacks on the Diameter delivery path can cause denial-of-service via misconfiguration (invalid addresses leading to connectivity failure or traffic interception via a fake border node). Diameter security is currently hop-by-hop only (RFC 6733 Section 2.2) with no end-to-end security solution, leaving intermediate Diameter peers able to tamper with AVP contents.
section: "6.1"
topics:
    - security
    - diameter
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
