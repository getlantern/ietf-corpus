document: rfc-9930
kind: normative-requirement
summary: The EAP peer MUST validate the server certificate in most cases per RFC 9190 Section 5.3. Where the peer has an NAI, it MUST use the realm to perform DNS-ID validation per RFC 9525, Section 6. Implementations MUST support matching the realm against a SubjectAltName dnsName in the server certificate.
section: "3.4"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
