document: rfc-7148
kind: normative-requirement
summary: If the PBU includes DMNP option(s) and the LMA is configured for Delegated Prefix support, the LMA MUST enable the DMNP option for that session and the PBA MUST include the allocated DMNP option(s).
section: 5.2.2
rfc2119_level: MUST
topics:
