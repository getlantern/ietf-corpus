document: rfc-3458
kind: interoperability-note
summary: Message-Context is only a hint; a message marked 'voice-message' but lacking an audio body part (e.g., after a content gateway strips large parts) must still be accepted and presented by the receiving UA rather than triggering an error or delivery failure.
