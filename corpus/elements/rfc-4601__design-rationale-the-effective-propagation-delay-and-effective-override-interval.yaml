document: rfc-4601
kind: design-rationale
summary: The Effective_Propagation_Delay and Effective_Override_Interval are computed as the maximum across all neighbors' advertised values, ensuring even the slowest router on a multi-access link can send an override Join before the upstream neighbor stops forwarding. Both options are ignored unless all neighbors on the link advertise support.
section: 4.3.3
topics:
    - multicast
    - routing
