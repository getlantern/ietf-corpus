document: rfc-2625
kind: normative-requirement
summary: Both Source and Destination 4-bit NAA identifiers in the FC Network_Header SHALL be set to binary '0001', indicating an IEEE 48-bit MAC address in the lower 48 bits of the network address fields; the high-order 12 bits SHALL be set to 0x0000.
section: "3.3"
rfc2119_level: SHALL
topics:
    - ip
