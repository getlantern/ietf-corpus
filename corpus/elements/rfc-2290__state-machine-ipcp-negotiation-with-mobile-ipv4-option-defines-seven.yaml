document: rfc-2290
kind: state-machine
summary: IPCP negotiation with Mobile-IPv4 option defines seven numbered request states and lettered peer responses. Mobile nodes SHOULD start with Request(IP=0,MIPv4=home) to prefer co-located CoA, or Request(MIPv4=home) to prefer foreign agent CoA. Responses include Ack (Opened), Nak (redirect to new state), or Reject (fall back). Nak(MIPv4=any) MUST NOT be sent in any state.
section: "2.5"
topics:
    - mobility
    - ip
