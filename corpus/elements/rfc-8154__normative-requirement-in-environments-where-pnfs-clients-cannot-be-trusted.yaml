document: rfc-8154
kind: normative-requirement
summary: In environments where pNFS clients cannot be trusted to enforce file-based security policies, pNFS SCSI layouts MUST NOT be used, because SCSI storage devices generally cannot enforce such file-based access controls.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - security
