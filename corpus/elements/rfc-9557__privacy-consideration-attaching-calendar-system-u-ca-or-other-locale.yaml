document: rfc-9557
kind: privacy-consideration
summary: Attaching calendar system (u-ca) or other locale-related tags to a timestamp can reveal personal or demographic information about the originator. Generators should apply data minimization and omit such suffix tags when recipients are not trusted or when the disclosure is not necessary for the application.
section: "7.1"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
