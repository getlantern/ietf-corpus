document: rfc-1573
kind: normative-requirement
summary: For interfaces operating at 20,000,000 bits/second or less, 32-bit byte and packet counters MUST be used. For interfaces faster than 20 Mbps but slower than 650 Mbps, 32-bit packet counters MUST be used and 64-bit octet counters MUST be used. For interfaces at 650,000,000 bits/second or faster, both 64-bit packet counters AND 64-bit octet counters MUST be used.
section: 3.2.6
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
