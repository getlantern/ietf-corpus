document: rfc-6275
kind: interoperability-note
summary: Mobile IPv6 route optimization is designed to coexist with routers performing ingress filtering. When sending packets from the care-of address with a Home Address destination option, the source address in the IP header is the care-of address (which passes ingress filtering), while the home address is carried in the extension option.
section: "2"
