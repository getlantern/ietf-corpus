document: rfc-9685
kind: design-rationale
summary: The P-Field value 3 (prefix registration) is reserved but not processed in 6LoWPAN ND because RPL already advertises prefixes by treating unicast addresses as /128 prefixes, while 6LoWPAN ND does not; a future separate document (draft-ietf-6lo-prefix-registration) is expected to define this behavior.
section: "6.5"
