document: rfc-3983
kind: interoperability-note
summary: The registry type SHOULD define a server authentication method because server authentication via TLS depends on the authority component of the URI; without an explicit definition, the basic server authentication method of Section 6.2 applies by default.
section: "6.1"
topics:
    - tls
    - security
