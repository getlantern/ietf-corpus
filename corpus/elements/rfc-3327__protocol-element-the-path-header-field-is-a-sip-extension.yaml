document: rfc-3327
kind: protocol-element
summary: The Path header field is a SIP extension header with syntax similar to Record-Route. It is used in REGISTER requests and 200-class REGISTER responses to accumulate the list of intermediate proxies between a UA and its registrar, enabling future requests to traverse the same proxies.
