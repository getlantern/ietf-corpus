document: rfc-7866
kind: normative-requirement
summary: The SRC MUST include the '+sip.src' feature tag in the Contact URI for all Recording Sessions, so that an SRS can confirm the dialog is for the purpose of a Recording Session. When an SRC sends a REGISTER request, it MAY include this tag to advertise itself.
section: 6.1.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
