document: rfc-1582
kind: wire-format
summary: 'IP RIP triggered commands (7 = TRIGGERED RESPONSE, 8 = TRIGGERED ACKNOWLEDGEMENT) insert four additional octets after the standard 4-octet header: sequence number (2 octets), fragment number (1 octet), number of fragments (1 octet). These fields are absent for standard commands (1–5). Up to 25 routing entries of 20 octets each follow in triggered response packets.'
section: "3"
