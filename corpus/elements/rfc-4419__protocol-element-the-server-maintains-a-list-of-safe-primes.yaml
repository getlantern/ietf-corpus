document: rfc-4419
kind: protocol-element
summary: The server maintains a list of safe primes and corresponding generators. A prime p is safe if p = 2q + 1 and q is also prime. The generator g must be chosen so the order of the generated subgroup does not factor into small primes (order must be q or p-1).
section: "3"
topics:
