document: rfc-7876
kind: normative-requirement
summary: If a URO is present in an MPLS-PLDM Query, the responder SHOULD use the IP address and UDP port in the URO to reply to the querier. If configured to send only one Response, the responder MUST use the parameters from the first usable URO.
section: "3"
rfc2119_level: SHOULD
topics:
    - mpls
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
