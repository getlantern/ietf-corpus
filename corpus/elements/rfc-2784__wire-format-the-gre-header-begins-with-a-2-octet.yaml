document: rfc-2784
kind: wire-format
summary: 'The GRE header begins with a 2-octet word containing: Checksum Present (bit 0), Reserved0 (bits 1-12), and Version (bits 13-15), followed by a 2-octet Protocol Type field. An optional second word contains Checksum (2 octets) and Reserved1 (2 octets), present only when the Checksum Present bit is set.'
