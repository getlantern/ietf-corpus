document: rfc-7331
kind: normative-requirement
summary: The 32-bit performance counters (e.g., bfdSessPerfCtrlPktIn) MUST be equal to the least significant 32 bits of their corresponding Counter64 objects (e.g., bfdSessPerfCtrlPktInHC), following RFC 2863 rules.
section: "5"
rfc2119_level: MUST
