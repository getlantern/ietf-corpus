name: deploy

# Auto-deploys the static site to Cloudflare Pages on every push to main.
#
# Required GitHub repository secrets:
#   - CLOUDFLARE_API_TOKEN  — scoped to "Account.Cloudflare Pages: Edit"
#   - CLOUDFLARE_ACCOUNT_ID
#
# The CF Pages project is named "ietf-corpus". Custom domain setup
# (e.g. ietf.lantern.io) is configured in the Cloudflare dashboard.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: build static site
        run: go run ./cmd/ietf-site --corpus . --out dist
      - name: deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name ietf-corpus --branch main
