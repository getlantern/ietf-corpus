name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -v ./...
      - name: render site (smoke check)
        run: go run ./cmd/ietf-site --corpus . --out /tmp/dist
